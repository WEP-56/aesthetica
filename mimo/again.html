<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>又</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0908;
            --muted: #4a4640;
            --text: #d8d0c4;
            --accent: #c4935a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'EB Garamond', 'Noto Serif SC', serif;
        }

        /* grain */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* slightly warmer than index.html */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(196,147,90,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── layout ── */
        .scene {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── empty circle (ghost of the clock) ── */
        .circle-wrap {
            opacity: 0;
            animation: fadeIn 5s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
        }

        .circle {
            width: clamp(120px, 28vmin, 180px);
            aspect-ratio: 1;
            border: 1px solid var(--muted);
            border-radius: 50%;
            position: relative;
            animation: spin 300s linear infinite;
        }

        /* single ghost mark at 12 */
        .circle::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            width: 1px;
            height: 8px;
            background: var(--muted);
            transform: translateX(-50%);
            opacity: 0.35;
        }

        /* ── text ── */
        .title {
            margin-top: clamp(32px, 6vmin, 56px);
            font-size: clamp(1.4rem, 4vmin, 2rem);
            font-weight: 200;
            letter-spacing: 0.5em;
            padding-left: 0.5em;
            color: var(--muted);
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 3s forwards;
        }

        .observation {
            margin-top: clamp(16px, 3vmin, 28px);
            font-size: clamp(0.85rem, 2.2vmin, 1rem);
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            opacity: 0;
            animation: fadeUp 6s cubic-bezier(0.16,1,0.3,1) 6s forwards;
            text-align: center;
            line-height: 2.2;
        }

        .secondary {
            margin-top: clamp(6px, 1.5vmin, 12px);
            font-size: clamp(0.75rem, 1.8vmin, 0.85rem);
            font-weight: 200;
            color: var(--muted);
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 9s forwards;
            text-align: center;
            line-height: 2;
        }

        /* ── navigation ── */
        .restart {
            position: fixed;
            bottom: clamp(28px, 6vh, 52px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-decoration: none;
            opacity: 0;
            animation: fadeUpFixed 4s cubic-bezier(0.16,1,0.3,1) 12s forwards;
            transition: color 1.5s ease;
        }

        .restart:hover { color: var(--accent); }

        /* ── keyframes ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpFixed {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01s !important;
                animation-delay: 0s !important;
                transition-duration: 0.01s !important;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="circle-wrap">
            <div class="circle"></div>
        </div>
        <div class="title">又</div>
        <div class="observation">你已经在这里了</div>
        <div class="secondary">也许一直都在</div>
    </div>
    <a href="index.html" class="restart">重新开始 →</a>

  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
