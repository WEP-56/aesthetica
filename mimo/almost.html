<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>将至</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080807;
            --muted: #4a4640;
            --text: #d8d0c4;
            --accent: #c4935a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'EB Garamond', 'Noto Serif SC', serif;
        }

        /* grain */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* breathing glow */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 52%, rgba(196,147,90,0.06) 0%, transparent 50%);
            pointer-events: none;
            animation: breathe 10s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        /* ── layout ── */
        .scene {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── text ── */
        .text-top {
            position: absolute;
            top: 14vh;
            font-size: clamp(0.72rem, 1.8vmin, 0.85rem);
            font-weight: 200;
            color: var(--muted);
            letter-spacing: 0.4em;
            padding-left: 0.4em;
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 3s forwards;
        }

        .text-bottom {
            margin-top: clamp(32px, 6vmin, 52px);
            font-size: clamp(0.85rem, 2.2vmin, 1rem);
            font-weight: 300;
            line-height: 2.2;
            text-align: center;
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 8s forwards;
        }

        .text-bottom .hl { color: var(--accent); }

        /* ── door ── */
        .door-link {
            text-decoration: none;
            color: inherit;
        }

        .door {
            width: clamp(80px, 16vmin, 120px);
            aspect-ratio: 0.55;
            border: 1px solid var(--muted);
            position: relative;
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 1s forwards;
            transition: border-color 3s ease;
            cursor: pointer;
        }

        .door-link:hover .door { border-color: var(--accent); }

        /* light crack */
        .door::before {
            content: '';
            position: absolute;
            top: 5%;
            bottom: 5%;
            left: 50%;
            width: 1px;
            background: var(--accent);
            opacity: 0;
            animation: crack 12s ease 6s forwards;
            filter: blur(0.5px);
            transform: translateX(-50%);
        }

        /* glow around door */
        .door::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(ellipse, rgba(196,147,90,0.08) 0%, transparent 65%);
            animation: pulse 8s ease-in-out 4s infinite;
            pointer-events: none;
        }

        .knob {
            position: absolute;
            right: 18%;
            top: 50%;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            border: 1px solid var(--muted);
            transform: translateY(-50%);
        }

        /* ── keyframes ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes crack {
            from { opacity: 0; }
            to   { opacity: 0.35; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 0.6; }
            50%      { transform: scale(1.1);  opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01s !important;
                animation-delay: 0s !important;
                transition-duration: 0.01s !important;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="text-top">有什么东西正在靠近</div>

        <a href="again.html" class="door-link">
            <div class="door">
                <div class="knob"></div>
            </div>
        </a>

        <div class="text-bottom">
            它还没有名字<br>
            但你<span class="hl">已经认识它了</span>
        </div>
    </div>

  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
