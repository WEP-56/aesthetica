<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小时</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080807;
            --muted: #4a4640;
            --text: #d8d0c4;
            --accent: #c4935a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', 'Noto Serif SC', serif;
            overflow-x: hidden;
        }

        /* film grain */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* scrollbar */
        html {
            scrollbar-width: thin;
            scrollbar-color: var(--muted) transparent;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

        /* ── layout ── */
        .page {
            max-width: 620px;
            margin: 0 auto;
            padding: 0 28px;
        }

        .gap    { height: 30vh; }
        .gap--lg { height: 42vh; }
        .gap--sm { height: 18vh; }
        .gap--enter { height: 38vh; }
        .gap--exit  { height: 18vh; }

        /* ── fragments ── */
        .frag {
            max-width: 400px;
            line-height: 2.2;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 2.5s cubic-bezier(0.16,1,0.3,1),
                        transform 2.5s cubic-bezier(0.16,1,0.3,1);
        }

        .frag.is-in {
            opacity: 1;
            transform: translateY(0);
        }

        .frag--lg {
            font-size: clamp(1rem, 2.5vmin, 1.15rem);
            font-weight: 300;
        }

        .frag--sm {
            font-size: clamp(0.85rem, 2vmin, 0.9rem);
            font-weight: 200;
            color: var(--muted);
        }

        .frag--italic { font-style: italic; }

        .left   { margin-right: auto; }
        .right  { margin-left: auto; text-align: right; }
        .center { margin-left: auto; margin-right: auto; text-align: center; }

        /* ── decorative ── */
        .rule {
            height: 1px;
            border: none;
            background: linear-gradient(to right, transparent, var(--muted) 30%, var(--muted) 70%, transparent);
            opacity: 0.2;
            max-width: 260px;
        }

        .rule--l { margin-right: auto; }
        .rule--r { margin-left: auto; }
        .rule--c { margin: 0 auto; }

        .diamond {
            width: 5px;
            height: 5px;
            background: var(--muted);
            transform: rotate(45deg);
            opacity: 0.25;
            margin: 0 auto;
        }

        .geo {
            width: 24px;
            height: 24px;
            border: 1px solid var(--muted);
            opacity: 0.1;
            animation: spin 200s linear infinite;
        }

        .geo--r { margin-left: auto; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── timer ── */
        .timer {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 0.65rem;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
            opacity: 0.35;
            letter-spacing: 0.1em;
            z-index: 100;
        }

        /* ── navigation ── */
        .next-wrap {
            text-align: center;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 3s ease, transform 3s ease;
        }

        .next-wrap.is-in {
            opacity: 1;
            transform: translateY(0);
        }

        .next {
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-decoration: none;
            transition: color 1.5s ease;
        }

        .next:hover { color: var(--accent); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01s !important;
                transition-duration: 0.01s !important;
            }
        }
    </style>
</head>
<body>
    <div class="timer" id="timer">00:00</div>

    <div class="page">
        <div class="gap--enter"></div>

        <div class="frag frag--lg left">椅子的影子<br>比椅子本身更真实</div>

        <div class="gap"></div>
        <hr class="rule rule--r">
        <div class="gap--sm"></div>

        <div class="frag frag--sm frag--italic right">
            水龙头在隔壁滴着<br>每一滴之间的间隔不等
        </div>

        <div class="gap--lg"></div>
        <div class="geo geo--r"></div>
        <div class="gap"></div>

        <div class="frag frag--lg left">
            墙纸的花纹里<br>藏着一张脸<br>你看了很久<br>才确认那只是花纹
        </div>

        <div class="gap--lg"></div>

        <div class="frag frag--sm right">窗外的路灯<br>把树的影子投进来</div>
        <div class="gap--sm"></div>
        <div class="frag frag--lg frag--italic right">风一吹<br>就像有人在招手</div>

        <div class="gap"></div>
        <hr class="rule rule--l">
        <div class="gap"></div>

        <div class="frag frag--sm left">
            手指无意识地敲击桌面<br>你听见了节奏<br>但不知道是哪首歌
        </div>

        <div class="gap--lg"></div>
        <div class="diamond"></div>
        <div class="gap"></div>

        <div class="frag frag--lg frag--italic center" style="max-width:340px">
            灰尘在光柱中旋转<br>它们不知道<br>自己正被注视
        </div>

        <div class="gap--lg"></div>

        <div class="frag frag--sm right">
            你开始数呼吸<br>吸气，呼气<br>数到第七次时<br>你忘了自己在数
        </div>

        <div class="gap"></div>
        <hr class="rule rule--c">
        <div class="gap--lg"></div>

        <div class="frag frag--lg center" style="max-width:360px">
            某个时刻你意识到<br>自己已经很久<br>没有想过任何事情了
        </div>

        <div class="gap--lg"></div>
        <div class="gap--sm"></div>

        <div class="next-wrap">
            <a href="almost.html" class="next">继 续 →</a>
        </div>

        <div class="gap--exit"></div>
    </div>

    <script>
        (function () {
            /* scroll reveals */
            var targets = document.querySelectorAll('.frag, .next-wrap');
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) e.target.classList.add('is-in');
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });
            targets.forEach(function (el) { observer.observe(el); });

            /* elapsed timer */
            var t0 = Date.now();
            var timerEl = document.getElementById('timer');
            function pad(n) { return n < 10 ? '0' + n : '' + n; }

            (function loop() {
                var s = Math.floor((Date.now() - t0) / 1000);
                timerEl.textContent = pad(Math.floor(s / 60)) + ':' + pad(s % 60);
                requestAnimationFrame(loop);
            })();

            /* background: black → pre-dawn blue */
            function onScroll() {
                var sh = document.documentElement.scrollHeight - window.innerHeight;
                var p = sh > 0 ? Math.min(1, window.scrollY / sh) : 0;
                var r = Math.round(8 - p * 5);
                var g = Math.round(8 - p * 3);
                var b = Math.round(7 + p * 20);
                document.body.style.backgroundColor =
                    'rgb(' + r + ',' + g + ',' + b + ')';
            }
            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
        })();
    </script>
</body>
</html>
