<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等待</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080807;
            --muted: #4a4640;
            --text: #d8d0c4;
            --accent: #c4935a;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'EB Garamond', 'Noto Serif SC', serif;
        }

        /* film grain */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* warm ambient glow */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 42%, rgba(196,147,90,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── layout ── */
        .scene {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── clock ── */
        .clock {
            width: clamp(120px, 28vmin, 180px);
            aspect-ratio: 1;
            border: 1px solid var(--muted);
            border-radius: 50%;
            position: relative;
            opacity: 0;
            animation: fadeIn 4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 1px;
            will-change: transform;
        }

        .hand--hour {
            width: 2px;
            height: 25%;
            margin-left: -1px;
            background: var(--text);
        }

        .hand--minute {
            width: 1.5px;
            height: 34%;
            margin-left: -0.75px;
            background: var(--text);
            opacity: 0.6;
        }

        .hand--second {
            width: 1px;
            height: 40%;
            margin-left: -0.5px;
            background: var(--accent);
        }

        .dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* ── text ── */
        .title {
            margin-top: clamp(32px, 6vmin, 56px);
            font-size: clamp(0.9rem, 2.5vmin, 1.15rem);
            font-weight: 200;
            letter-spacing: 0.8em;
            padding-left: 0.8em;
            color: var(--muted);
            opacity: 0;
            animation: fadeUp 5s cubic-bezier(0.16,1,0.3,1) 3.5s forwards;
        }

        .observation {
            margin-top: clamp(16px, 3vmin, 28px);
            font-size: clamp(0.8rem, 2vmin, 0.95rem);
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            opacity: 0;
            animation: fadeUp 6s cubic-bezier(0.16,1,0.3,1) 6s forwards;
            text-align: center;
            line-height: 2;
            letter-spacing: 0.05em;
        }

        .hint {
            position: fixed;
            bottom: clamp(72px, 16vh, 140px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.15em;
            opacity: 0;
            transition: opacity 5s ease;
            white-space: nowrap;
        }

        /* ── navigation ── */
        .enter {
            position: fixed;
            bottom: clamp(28px, 6vh, 52px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: var(--muted);
            text-decoration: none;
            opacity: 0;
            animation: fadeUpFixed 4s cubic-bezier(0.16,1,0.3,1) 10s forwards;
            transition: color 1.5s ease;
        }

        .enter:hover { color: var(--accent); }

        /* ── keyframes ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpFixed {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01s !important;
                animation-delay: 0s !important;
                transition-duration: 0.01s !important;
            }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="clock">
            <div class="hand hand--hour" id="h"></div>
            <div class="hand hand--minute" id="m"></div>
            <div class="hand hand--second" id="s"></div>
            <div class="dot"></div>
        </div>
        <div class="title">等 待</div>
        <div class="observation">钟面上的秒针<br>比记忆中走得更慢</div>
    </div>

    <div class="hint" id="hint">如果再等一会儿</div>
    <a href="hour.html" class="enter">进 入 →</a>

    <script>
        (function () {
            /* ── irregular clock ── */
            var t = 0, prev = performance.now();
            var hEl = document.getElementById('h');
            var mEl = document.getElementById('m');
            var sEl = document.getElementById('s');

            function tick(now) {
                var dt = (now - prev) / 1000;
                prev = now;

                var drift = Math.sin(t * 0.23) * 0.35
                          + Math.sin(t * 0.061) * 0.25;
                var stutter = Math.sin(t * 1.6) > 0.93 ? 0.04 : 1;
                t += dt * Math.max(0, 1 + drift) * stutter;

                var s = t % 60;
                var m = (t / 60) % 60;
                var h = (t / 3600) % 12;

                sEl.style.transform = 'rotate(' + (s * 6) + 'deg)';
                mEl.style.transform = 'rotate(' + (m * 6) + 'deg)';
                hEl.style.transform = 'rotate(' + (h * 30) + 'deg)';

                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);

            /* ── hint: appear at 14 s ── */
            setTimeout(function () {
                document.getElementById('hint').style.opacity = '1';
            }, 14000);

            /* ── hint: transform at 30 s ── */
            setTimeout(function () {
                var el = document.getElementById('hint');
                el.style.opacity = '0';
                setTimeout(function () {
                    el.textContent = '你还在等';
                    el.style.opacity = '1';
                }, 5000);
            }, 30000);
        })();
    </script>

  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
