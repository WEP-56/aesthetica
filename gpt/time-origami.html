<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RITE 03 // 时间折纸</title>
  <style>
    :root {
      --paper: #f4efe6;
      --ink: #080909;
      --line: rgba(244, 239, 230, 0.16);
      --dim: rgba(244, 239, 230, 0.64);
      --gold: #f3bd63;
      --cyan: #42e6d2;
      --rose: #ff5d8f;
      --violet: #9d7cff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 48% 42%, transparent 0 30%, rgba(0,0,0,0.34) 64%, rgba(0,0,0,0.76)),
        linear-gradient(90deg, rgba(255,93,143,0.08), transparent 30%, transparent 70%, rgba(66,230,210,0.08));
    }

    header {
      position: fixed;
      z-index: 2;
      inset: 28px 30px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 430px);
      gap: 28px;
      align-items: start;
      pointer-events: none;
    }

    a, button, input { pointer-events: auto; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back, .coordinates, .label {
      font-family: "Consolas", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .back {
      display: inline-block;
      color: var(--dim);
      font-size: 12px;
      border-bottom: 1px solid rgba(244,239,230,0.28);
      padding-bottom: 6px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 8.8vw, 126px);
      line-height: 0.88;
      font-weight: 760;
      letter-spacing: 0;
    }

    .intent {
      margin: 38px 0 0;
      color: rgba(244,239,230,0.72);
      line-height: 1.8;
      font-size: 14px;
      text-align: right;
    }

    .controls {
      position: fixed;
      z-index: 2;
      left: 30px;
      right: 30px;
      bottom: 26px;
      display: grid;
      grid-template-columns: minmax(220px, 520px) auto;
      gap: 24px;
      align-items: end;
      pointer-events: none;
    }

    .slider {
      border: 1px solid var(--line);
      background: rgba(8,9,9,0.56);
      backdrop-filter: blur(16px);
      padding: 14px 16px;
      pointer-events: auto;
    }

    .label {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--dim);
      font-size: 10px;
      margin-bottom: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .coordinates {
      display: flex;
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
      pointer-events: auto;
    }

    .coordinates span {
      min-width: 112px;
      background: rgba(8,9,9,0.66);
      padding: 13px 14px;
      color: var(--dim);
      font-size: 10px;
    }

    .coordinates b {
      display: block;
      color: var(--paper);
      margin-top: 8px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0;
    }

    @media (max-width: 800px) {
      header {
        inset: 20px 20px auto;
        display: block;
      }
      .intent {
        text-align: left;
        max-width: 340px;
        margin-top: 18px;
        font-size: 12px;
      }
      .controls {
        left: 20px;
        right: 20px;
        bottom: 20px;
        grid-template-columns: 1fr;
      }
      .coordinates { display: grid; grid-template-columns: repeat(3, 1fr); }
      .coordinates span { min-width: 0; }
    }
  </style>
</head>
<body>
  <canvas id="fold"></canvas>
  <div class="veil"></div>

  <header>
    <div>
      <a class="back" href="index.html">← DIGITAL RITES</a>
      <h1>时间<br>折纸</h1>
    </div>
    <p class="intent">
      创作意图：把时间做成一张能被拖拽的纸。每一片折面都是一帧被压缩的光，拖动时叙事会从平面时间线变成可旋转的空间雕塑。
    </p>
  </header>

  <div class="controls">
    <label class="slider">
      <span class="label"><span>manual crease</span><span>drag canvas to sculpt</span></span>
      <input id="crease" type="range" min="0" max="100" value="54">
    </label>
    <div class="coordinates" aria-label="折叠参数">
      <span>fold <b id="foldValue">0.54</b></span>
      <span>tilt <b id="tiltValue">0.00</b></span>
      <span>time <b id="timeValue">000</b></span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("fold");
    const ctx = canvas.getContext("2d");
    const crease = document.getElementById("crease");
    const foldValue = document.getElementById("foldValue");
    const tiltValue = document.getElementById("tiltValue");
    const timeValue = document.getElementById("timeValue");
    const pointer = { x: 0.5, y: 0.5, down: false };
    const shards = new Array(42).fill(0).map((_, i) => ({
      seed: Math.random() * 20,
      index: i,
      flash: Math.random()
    }));
    let dpr = 1;
    let manual = 0.54;
    let fold = 0.54;
    let tilt = 0;
    let t = 0;

    function resize() {
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function shadeColor(a, b, c, alpha) {
      return `rgba(${Math.round(a)},${Math.round(b)},${Math.round(c)},${alpha})`;
    }

    function project(x, y, z, yaw, pitch) {
      const cy = Math.cos(yaw);
      const sy = Math.sin(yaw);
      const cp = Math.cos(pitch);
      const sp = Math.sin(pitch);
      const rx = x * cy - z * sy;
      const rz = x * sy + z * cy;
      const ry = y * cp - rz * sp;
      const rz2 = y * sp + rz * cp;
      const scale = 760 / (760 + rz2);
      return {
        x: innerWidth / 2 + rx * scale,
        y: innerHeight / 2 + ry * scale,
        scale
      };
    }

    function polygon(points, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.stroke();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, innerHeight);
      grad.addColorStop(0, "#080909");
      grad.addColorStop(0.58, "#0d0d10");
      grad.addColorStop(1, "#020303");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      ctx.lineWidth = 1;
      for (let i = 0; i < 34; i++) {
        const y = innerHeight * 0.18 + i * innerHeight * 0.025;
        const alpha = 0.03 + i / 34 * 0.05;
        ctx.strokeStyle = `rgba(244,239,230,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(0, y + Math.sin(t + i) * 8);
        ctx.lineTo(innerWidth, y + Math.cos(t * 0.7 + i) * 8);
        ctx.stroke();
      }
    }

    function drawOrigami() {
      const yaw = (pointer.x - 0.5) * 0.92 + tilt;
      const pitch = -0.28 + (pointer.y - 0.5) * 0.22;
      const width = Math.min(innerWidth * 0.78, 980);
      const height = Math.min(innerHeight * 0.5, 440);
      const count = shards.length;
      const strip = width / count;
      const left = -width / 2;
      const top = -height / 2;
      const polys = [];

      for (const shard of shards) {
        const i = shard.index;
        const x0 = left + i * strip;
        const x1 = x0 + strip * 1.12;
        const phase = i / (count - 1);
        const wave = Math.sin(phase * Math.PI * 5 + t * 1.2);
        const creaseLine = Math.sin((phase - 0.5) * Math.PI * 2) * fold;
        const angle = (i % 2 ? 1 : -1) * (0.2 + fold * 1.15) + wave * 0.12;
        const z0 = Math.sin(phase * Math.PI * 4 + t) * 34 + creaseLine * 170;
        const z1 = z0 + Math.sin(angle) * 105;
        const skew = Math.cos(angle) * 34;
        const yTop0 = top + Math.sin(t + shard.seed) * 18;
        const yBot0 = top + height + Math.cos(t * 0.8 + shard.seed) * 20;
        const p = [
          project(x0, yTop0, z0, yaw, pitch),
          project(x1, yTop0 + skew, z1, yaw, pitch),
          project(x1, yBot0 - skew, z1 + Math.cos(angle) * 42, yaw, pitch),
          project(x0, yBot0, z0, yaw, pitch)
        ];
        const light = Math.max(0, Math.min(1, 0.5 + Math.cos(angle + yaw) * 0.45));
        const warm = i % 3 === 0;
        const cool = i % 3 === 1;
        const r = warm ? 210 + light * 45 : cool ? 62 + light * 80 : 200 + light * 40;
        const g = warm ? 130 + light * 80 : cool ? 190 + light * 55 : 82 + light * 50;
        const b = warm ? 72 + light * 80 : cool ? 190 + light * 45 : 134 + light * 70;
        polys.push({
          z: z0 + z1,
          points: p,
          fill: shadeColor(r, g, b, 0.38 + light * 0.38),
          stroke: `rgba(244,239,230,${0.08 + light * 0.14})`,
          phase,
          light
        });
      }

      polys.sort((a, b) => a.z - b.z);
      ctx.lineWidth = 1;
      ctx.shadowColor = "rgba(66,230,210,0.18)";
      ctx.shadowBlur = 18;
      for (const poly of polys) polygon(poly.points, poly.fill, poly.stroke);
      ctx.shadowBlur = 0;

      for (let i = 0; i < 16; i++) {
        const phase = i / 15;
        const x = left + width * phase;
        const y = top + height * (0.28 + Math.sin(t * 0.8 + i) * 0.18);
        const z = Math.sin(phase * Math.PI * 5 + t) * 120 * fold;
        const a = project(x, y, z, yaw, pitch);
        const b = project(x + 44, y + 18, z + 60, yaw, pitch);
        ctx.strokeStyle = i % 2 ? "rgba(66,230,210,0.55)" : "rgba(243,189,99,0.48)";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    function draw() {
      t += 0.012;
      const pointerFold = pointer.down ? 0.18 + pointer.y * 0.86 : manual;
      fold += (pointerFold - fold) * 0.08;
      tilt += ((pointer.x - 0.5) * 0.34 - tilt) * 0.05;
      drawBackground();
      drawOrigami();
      foldValue.textContent = fold.toFixed(2);
      tiltValue.textContent = tilt.toFixed(2);
      timeValue.textContent = String(Math.floor(t * 100) % 1000).padStart(3, "0");
      requestAnimationFrame(draw);
    }

    crease.addEventListener("input", () => { manual = Number(crease.value) / 100; });
    addEventListener("pointermove", (event) => {
      pointer.x = event.clientX / innerWidth;
      pointer.y = event.clientY / innerHeight;
    });
    addEventListener("pointerdown", (event) => {
      pointer.down = true;
      pointer.x = event.clientX / innerWidth;
      pointer.y = event.clientY / innerHeight;
    });
    addEventListener("pointerup", () => pointer.down = false);
    addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
