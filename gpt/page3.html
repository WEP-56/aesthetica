<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>未寄出 | 退潮档案</title>
  <style>
    :root {
      --paper: #e5decf;
      --ink: #1e1f1b;
      --muted: #736b5c;
      --line: rgba(30, 31, 27, .24);
      --screen: #263f45;
      --old: #8e3026;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      background:
        linear-gradient(90deg, transparent 0 49.8%, rgba(30, 31, 27, .14) 49.9%, transparent 50.1%),
        repeating-linear-gradient(180deg, rgba(30, 31, 27, .035) 0 1px, transparent 1px 28px),
        var(--paper);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 0 44px;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 38px;
    }

    aside {
      border-right: 1px solid var(--line);
      padding-right: 22px;
      color: var(--muted);
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 13px;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      margin-bottom: 34px;
    }

    .side-title {
      font-size: 16px;
      line-height: 1.7;
      margin-top: 30vh;
    }

    .side-title strong {
      display: block;
      color: var(--old);
      font-weight: 400;
      font-size: 42px;
      line-height: 1;
      margin-bottom: 14px;
    }

    article {
      padding-top: 9vh;
    }

    .kicker {
      color: var(--muted);
      font: 12px/1.3 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 38px;
      font-size: clamp(54px, 10vw, 122px);
      line-height: .9;
      font-weight: 400;
    }

    .messages {
      display: grid;
      gap: 18px;
      max-width: 720px;
    }

    .msg {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      padding: 18px 18px 16px;
      background: rgba(255, 255, 255, .14);
      position: relative;
    }

    .msg:nth-child(even) {
      justify-self: end;
      background: rgba(38, 63, 69, .08);
    }

    .msg::before {
      content: attr(data-time);
      display: block;
      color: var(--muted);
      font: 11px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      margin-bottom: 12px;
    }

    .msg p {
      margin: 0;
      font-size: clamp(19px, 2.2vw, 26px);
      line-height: 1.7;
    }

    .msg .status {
      display: block;
      margin-top: 14px;
      color: var(--old);
      font: 12px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-align: right;
    }

    .cursor {
      display: inline-block;
      width: .5em;
      height: 1em;
      background: var(--screen);
      vertical-align: -.12em;
      animation: blink 1.2s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .after {
      margin-top: 42px;
      max-width: 560px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
    }

    @media (max-width: 760px) {
      .wrap {
        display: block;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 0 0 18px;
      }

      .nav {
        flex-direction: row;
        flex-wrap: wrap;
        margin-bottom: 0;
      }

      .side-title {
        margin-top: 28px;
      }

      article {
        padding-top: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <aside>
      <nav class="nav" aria-label="页面导航">
        <a href="index.html">目录</a>
        <a href="page2.html">上一页</a>
        <a href="page4.html">下一页</a>
      </nav>
      <p class="side-title"><strong>03</strong>草稿箱内共有 9 条消息。以下 5 条未被系统自动清理。</p>
    </aside>

    <article>
      <div class="kicker">saved but not sent</div>
      <h1>未寄出</h1>

      <section class="messages" aria-label="未发送消息">
        <div class="msg" data-time="03:14">
          <p>你听见了吗？不是雨声。像有人在很远的楼层拖动一张湿桌子。</p>
          <span class="status">draft</span>
        </div>
        <div class="msg" data-time="03:17">
          <p>电梯停在负一层，但显示屏一直在往下数。</p>
          <span class="status">draft</span>
        </div>
        <div class="msg" data-time="03:19">
          <p>如果明天有人问起，就说我从正门出去的。不要补充。</p>
          <span class="status">draft</span>
        </div>
        <div class="msg" data-time="03:23">
          <p>水退得太整齐了，像被谁排练过。</p>
          <span class="status">draft</span>
        </div>
        <div class="msg" data-time="--:--">
          <p>我还在这里<span class="cursor" aria-hidden="true"></span></p>
          <span class="status">unsaved</span>
        </div>
      </section>

      <p class="after">设备未联网，时间来自本地缓存。最后一条消息没有生成记录，可能是屏幕进水后的误触，也可能不是。</p>
    </article>
  </main>
</body>
</html>
