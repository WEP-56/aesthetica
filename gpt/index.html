<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>退潮档案</title>
  <style>
    :root {
      --paper: #e7e1d2;
      --ink: #20201c;
      --faint: #787263;
      --line: rgba(32, 32, 28, .24);
      --seal: #8f2f24;
      --blue: #253f48;
      --green: #596a50;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #171814;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      background:
        linear-gradient(90deg, rgba(32, 32, 28, .05) 1px, transparent 1px) 0 0 / 64px 64px,
        linear-gradient(rgba(32, 32, 28, .045) 1px, transparent 1px) 0 0 / 64px 64px,
        radial-gradient(circle at 18% 12%, rgba(143, 47, 36, .12), transparent 28%),
        var(--paper);
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, transparent 0 33%, rgba(37, 63, 72, .09) 33.2%, transparent 33.9%),
        repeating-linear-gradient(7deg, rgba(32, 32, 28, .03) 0 1px, transparent 1px 6px);
      mix-blend-mode: multiply;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 34px 0 30px;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(230px, .72fr) minmax(0, 1.28fr);
      gap: 26px;
    }

    .ledger {
      border-right: 1px solid var(--line);
      padding: 12px 26px 0 0;
      position: relative;
    }

    .ledger::after {
      content: "37cm";
      position: absolute;
      top: 31.6vh;
      right: -14px;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(143, 47, 36, .55);
      border-radius: 50%;
      color: var(--seal);
      font-size: 12px;
      transform: rotate(-11deg);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--faint);
      font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-transform: uppercase;
    }

    h1 {
      margin: 74px 0 12px;
      font-size: clamp(44px, 8vw, 104px);
      line-height: .92;
      font-weight: 400;
    }

    .subtitle {
      max-width: 18rem;
      margin: 0;
      color: var(--blue);
      font-size: 17px;
      line-height: 1.9;
    }

    .note {
      margin-top: 28vh;
      color: var(--faint);
      font-size: 13px;
      line-height: 1.8;
      max-width: 20rem;
    }

    .archive {
      align-self: center;
      padding: 34px 0 14px;
    }

    .rule {
      height: 1px;
      background: var(--line);
      margin-bottom: 20px;
    }

    .entry {
      min-height: 112px;
      display: grid;
      grid-template-columns: 86px 1fr 46px;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      transition: background .25s ease, transform .25s ease;
    }

    .entry:hover {
      background: rgba(255, 255, 255, .16);
      transform: translateX(6px);
    }

    .entry:focus-visible {
      outline: 2px solid var(--seal);
      outline-offset: 6px;
    }

    .num {
      color: var(--faint);
      font: 13px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .entry strong {
      display: block;
      font-size: clamp(24px, 4vw, 43px);
      line-height: 1.1;
      font-weight: 400;
    }

    .entry span {
      display: block;
      margin-top: 8px;
      color: var(--green);
      font-size: 14px;
      line-height: 1.5;
    }

    .arrow {
      justify-self: end;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font: 16px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      color: var(--blue);
    }

    .footerline {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--faint);
      font: 12px/1.6 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    @media (max-width: 760px) {
      .shell {
        display: block;
        padding-top: 20px;
      }

      .ledger {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 0 0 28px;
      }

      .ledger::after {
        top: auto;
        bottom: 24px;
        right: 6px;
      }

      h1 {
        margin-top: 48px;
      }

      .note {
        margin-top: 44px;
      }

      .entry {
        grid-template-columns: 54px 1fr 36px;
        min-height: 96px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="ledger" aria-labelledby="title">
      <div class="meta">
        <span>archive no. 04</span>
        <span>after tide</span>
      </div>
      <h1 id="title">退潮<br>档案</h1>
      <p class="subtitle">一份没有申请编号的材料。水退下去以后，剩下的东西开始替人说话。</p>
      <p class="note">请不要寻找完整事件。这里保存的只有高度、物件、句子和值班人没有删干净的犹豫。</p>
    </section>

    <section class="archive" aria-label="档案目录">
      <div class="rule"></div>
      <a class="entry" href="page1.html">
        <span class="num">01</span>
        <span><strong>潮线</strong><span>墙面留下的水位，比证词更稳定。</span></span>
        <span class="arrow">→</span>
      </a>
      <a class="entry" href="page2.html">
        <span class="num">02</span>
        <span><strong>失物</strong><span>所有物件都在等待一个迟到的主人。</span></span>
        <span class="arrow">→</span>
      </a>
      <a class="entry" href="page3.html">
        <span class="num">03</span>
        <span><strong>未寄出</strong><span>短信被保存，发送键被推迟。</span></span>
        <span class="arrow">→</span>
      </a>
      <a class="entry" href="page4.html">
        <span class="num">04</span>
        <span><strong>值班记录</strong><span>有人在夜里把异常事项写得很轻。</span></span>
        <span class="arrow">→</span>
      </a>
      <a class="entry" href="page5.html">
        <span class="num">05</span>
        <span><strong>出口</strong><span>离开也是档案的一部分。</span></span>
        <span class="arrow">→</span>
      </a>
      <div class="footerline">
        <span>opened manually</span>
        <span>do not restore order</span>
      </div>
    </section>
  </main>
</body>
</html>
