<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮汐信笺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(
                180deg,
                #c4ccd4 0%,
                #9aa8b4 40%,
                #6b8494 70%,
                #4a6a7a 100%
            );
            font-family: "Courier New", "Lucida Console", monospace;
            cursor: default;
        }

        /* 房间 */
        .room {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        /* 天花板 */
        .ceiling {
            height: 12%;
            background: linear-gradient(
                180deg,
                #8a929c 0%,
                #7a848c 50%,
                #6a7480 100%
            );
        }

        /* 墙面 */
        .wall {
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        /* 左墙 */
        .wall-left {
            width: 15%;
            background: linear-gradient(
                90deg,
                #6a7480 0%,
                #7a848c 100%
            );
        }

        /* 右墙 */
        .wall-right {
            width: 15%;
            background: linear-gradient(
                270deg,
                #6a7480 0%,
                #7a848c 100%
            );
        }

        /* 主墙面 - 窗所在 */
        .wall-main {
            flex: 1;
            background: linear-gradient(
                180deg,
                #8a929c 0%,
                #7a848c 30%,
                #6a7480 100%
            );
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 窗户 */
        .window {
            width: 35%;
            height: 70%;
            background: linear-gradient(
                180deg,
                #3a5a6a 0%,
                #2a4a5a 40%,
                #1a3a4a 100%
            );
            border: 8px solid #4a4a4a;
            border-radius: 2px;
            position: relative;
            box-shadow:
                inset 0 0 60px rgba(0,0,0,0.3),
                0 0 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* 窗外的海 */
        .sea {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                #4a6a7a 0%,
                #3a5a6a 50%,
                #2a4a5a 100%
            );
        }

        .sea::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 20%;
            top: 60%;
            left: -50%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.03) 20px,
                rgba(255,255,255,0.03) 40px
            );
            animation: wave 8s linear infinite;
        }

        @keyframes wave {
            from { transform: translateX(0); }
            to { transform: translateX(40px); }
        }

        /* 窗框分隔 */
        .window-frame-v {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 6px;
            margin-left: -3px;
            background: #4a4a4a;
        }

        .window-frame-h {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            margin-top: -3px;
            background: #4a4a4a;
        }

        /* 桌面 */
        .desk {
            height: 18%;
            background: linear-gradient(
                0deg,
                #3a3028 0%,
                #4a4038 50%,
                #5a5048 100%
            );
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 2%;
        }

        /* 桌面边缘 */
        .desk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 4px;
            background: linear-gradient(
                90deg,
                #2a2018,
                #5a5048,
                #2a2018
            );
        }

        /* 物品容器 */
        .items {
            display: flex;
            gap: 8%;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* 物品项 */
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        /* 物品形状 - CSS绘制 */
        .item-shape {
            transition: transform 0.3s ease;
        }

        .item:hover .item-shape {
            transform: translateY(-3px);
        }

        /* 石子 */
        .stone-shape {
            width: 18px;
            height: 14px;
            background: #5a5a5a;
            border-radius: 45% 55% 50% 50%;
            box-shadow:
                inset -2px -2px 4px rgba(0,0,0,0.3),
                1px 2px 3px rgba(0,0,0,0.2);
        }

        /* 信封 */
        .letter-shape {
            width: 28px;
            height: 18px;
            background: #d4c8b4;
            border-radius: 2px;
            position: relative;
            box-shadow:
                inset -2px -2px 4px rgba(0,0,0,0.1),
                1px 2px 3px rgba(0,0,0,0.2);
        }

        .letter-shape::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(
                135deg,
                transparent 50%,
                #c4b8a4 50%
            );
        }

        /* 指南针 */
        .compass-shape {
            width: 22px;
            height: 22px;
            background: radial-gradient(
                circle,
                #e8e0d0 0%,
                #c8c0b0 60%,
                #a8a090 100%
            );
            border-radius: 50%;
            border: 2px solid #6a6a6a;
            position: relative;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.3);
        }

        .compass-shape::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 2px;
            margin-top: -1px;
            margin-left: -5px;
            background: linear-gradient(
                90deg,
                #cc4444 0%,
                #444444 50%,
                #eeeeee 100%
            );
        }

        .compass-shape::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 10px;
            margin-top: -5px;
            margin-left: -1px;
            background: linear-gradient(
                180deg,
                #eeeeee 0%,
                #444444 50%,
                #cc4444 100%
            );
        }

        /* 船票 */
        .ticket-shape {
            width: 32px;
            height: 16px;
            background: #d4a868;
            border-radius: 2px;
            position: relative;
            box-shadow:
                inset -2px -2px 4px rgba(0,0,0,0.1),
                1px 2px 3px rgba(0,0,0,0.2);
        }

        .ticket-shape::before,
        .ticket-shape::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 4px;
            height: 4px;
            background: #4a4038;
            border-radius: 50%;
            margin-top: -2px;
        }

        .ticket-shape::before { left: -2px; }
        .ticket-shape::after { right: -2px; }

        /* 物品标签 */
        .item-label {
            margin-top: 8px;
            font-size: 10px;
            color: #8a8a8a;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .item:hover .item-label {
            opacity: 0.7;
        }

        /* 链接样式 */
        .item a {
            text-decoration: none;
            color: inherit;
        }

        /* 地面 */
        .floor {
            height: 8%;
            background: linear-gradient(
                0deg,
                #2a2820 0%,
                #3a3830 100%
            );
        }

        /* 页面标题 */
        .title {
            position: fixed;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 10;
            animation: fadeIn 3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            z-index: 10;
            animation: fadeIn 5s ease 2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 窗帘 */
        .curtain-left,
        .curtain-right {
            position: absolute;
            top: 15%;
            height: 85%;
            width: 8%;
            background: linear-gradient(
                90deg,
                #4a4a4a 0%,
                #5a5a5a 50%,
                #4a4a4a 100%
            );
        }

        .curtain-left {
            left: 32%;
            border-radius: 0 0 40% 0;
        }

        .curtain-right {
            right: 32%;
            border-radius: 0 0 0 40%;
        }

        /* 房间角落光影 */
        .shadow-corner {
            position: absolute;
            width: 15%;
            height: 15%;
            background: radial-gradient(
                ellipse at center,
                rgba(0,0,0,0.1) 0%,
                transparent 70%
            );
        }

        .shadow-top-left {
            top: 0;
            left: 0;
        }

        .shadow-top-right {
            top: 0;
            right: 0;
        }
    </style>
</head>

    return text.length > 50 ? text.substring(0, 50) + "..." : text;
  }

  // 获取元素属性信息
  function getElementAttributes(element) {
    var attrs = {};
    for (var i = 0; i < element.attributes.length; i++) {
      var attr = element.attributes[i];
      attrs[attr.name] = attr.value;
    }
    return attrs;
  }

  // 鼠标悬停事件处理
  function handleMouseOver(e) {
    if (!highlightEnabled) return;
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免高亮 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 如果是已选中的元素，不显示悬停高亮
    if (target === selectedElement) {
      highlightBox.style.display = "none";
      tagLabel.style.display = "none";
      return;
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);

    // 更新悬停高亮框位置
    highlightBox.style.display = "block";
    highlightBox.style.left = "".concat(rect.left - 2, "px");
    highlightBox.style.top = "".concat(rect.top - 2, "px");
    highlightBox.style.width = "".concat(rect.width + 4, "px");
    highlightBox.style.height = "".concat(rect.height + 4, "px");

    // 更新标签位置和内容
    tagLabel.style.display = "block";
    tagLabel.textContent = "<".concat(target.tagName.toLowerCase(), ">");

    // 计算标签位置，确保不超出视窗
    var labelTop = rect.top - 22;
    var labelLeft = rect.left;

    // 如果标签会超出顶部，显示在元素下方
    if (labelTop < 0) {
      labelTop = rect.bottom + 5;
    }

    // 如果标签会超出右侧，向左调整
    if (labelLeft + tagLabel.offsetWidth > window.innerWidth) {
      labelLeft = window.innerWidth - tagLabel.offsetWidth - 5;
    }
    tagLabel.style.left = "".concat(Math.max(0, labelLeft), "px");
    tagLabel.style.top = "".concat(labelTop, "px");

    // 发送消息到父窗口
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 鼠标离开事件处理
  function handleMouseOut(e) {
    if (!highlightEnabled) return;
    var relatedTarget = e.relatedTarget;

    // 如果鼠标移动到高亮相关元素上，不隐藏高亮
    if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
      return;
    }
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: null,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 点击事件处理
  function handleClick(e) {
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免处理 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
