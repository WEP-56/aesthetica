<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(
                180deg,
                #8a9aa8 0%,
                #6a7a8a 30%,
                #4a5a6a 60%,
                #3a4a5a 100%
            );
            font-family: "Courier New", "Lucida Console", monospace;
            cursor: default;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 沙滩 */
        .shore {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25%;
            background: linear-gradient(
                0deg,
                #3a3530 0%,
                #4a4540 50%,
                #5a5548 100%
            );
        }

        /* 沙滩纹理 */
        .shore::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0,0,0,0.1) 1px, transparent 1px),
                radial-gradient(circle at 60% 70%, rgba(0,0,0,0.08) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, rgba(0,0,0,0.1) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 海水 */
        .water {
            position: absolute;
            bottom: 20%;
            left: 0;
            right: 0;
            height: 35%;
            background: linear-gradient(
                0deg,
                #3a5a6a 0%,
                #4a6a7a 50%,
                #5a7a8a 100%
            );
        }

        /* 波浪 */
        .wave {
            position: absolute;
            width: 200%;
            height: 30px;
            left: -50%;
        }

        .wave-1 {
            top: 10%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.05) 25%,
                transparent 50%,
                rgba(255,255,255,0.05) 75%,
                transparent
            );
            animation: wave 12s linear infinite;
        }

        .wave-2 {
            top: 40%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.03) 30%,
                transparent 60%,
                rgba(255,255,255,0.03) 80%,
                transparent
            );
            animation: wave 18s linear infinite reverse;
        }

        @keyframes wave {
            from { transform: translateX(0); }
            to { transform: translateX(50%); }
        }

        /* 潮汐痕迹 */
        .tide-mark {
            position: absolute;
            bottom: 22%;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.15) 20%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0.15) 80%,
                transparent 100%
            );
            border-radius: 1px;
        }

        /* 天空 */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(
                180deg,
                #9aa8b8 0%,
                #7a8a9a 50%,
                #5a6a7a 100%
            );
        }

        /* 石子 */
        .stone {
            position: absolute;
            bottom: 23%;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 28px;
            background: linear-gradient(
                135deg,
                #6a6a6a 0%,
                #5a5a5a 40%,
                #4a4a4a 100%
            );
            border-radius: 45% 55% 50% 50%;
            box-shadow:
                inset -4px -4px 8px rgba(0,0,0,0.3),
                inset 2px 2px 4px rgba(255,255,255,0.1),
                2px 4px 8px rgba(0,0,0,0.3);
        }

        .stone::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        /* 文字记忆 */
        .memory {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            max-width: 280px;
        }

        .memory-line {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            line-height: 2.2;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .memory:hover .memory-line {
            opacity: 0.85;
        }

        /* 消散进度条 */
        .fade-progress {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 1px;
            overflow: hidden;
        }

        .fade-progress-bar {
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transform-origin: right;
            transition: transform 0.1s linear;
        }

        /* 返回链接 */
        .back {
            position: fixed;
            top: 5%;
            left: 5%;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back:hover {
            color: rgba(255,255,255,0.6);
        }

        /* 页码 */
        .page-title {
            position: fixed;
            bottom: 5%;
            right: 5%;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }

        /* 装饰性贝壳 */
        .shell {
            position: absolute;
            bottom: 24%;
            width: 8px;
            height: 6px;
            background: #c4b8a8;
            border-radius: 50% 50% 0 0;
            opacity: 0.4;
        }

        .shell-1 { left: 35%; }
        .shell-2 { left: 65%; transform: scale(0.7); }
        .shell-3 { left: 72%; transform: scale(0.5); bottom: 24.5%; }

        /* 标题 */
        .title {
            position: fixed;
            top: 5%;
            right: 5%;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
            writing-mode: vertical-rl;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">返回</a>
    <span class="title">潮汐信笺</span>

    <div class="container">
        <div class="sky"></div>
        <div class="water">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
        </div>
        <div class="tide-mark"></div>
        <div class="shore"></div>

        <div class="shell shell-1"></div>
        <div class="shell shell-2"></div>
        <div class="shell shell-3"></div>

        <div class="stone"></div>

        <div class="memory" id="memory">
            <div class="memory-line">它被海水打磨了很久</div>
            <div class="memory-line">才变成现在这个样子</div>
            <div class="memory-line">我不知道它原来的棱角</div>
            <div class="memory-line">去了哪里</div>
        </div>
    </div>

    <div class="fade-progress">
        <div class="fade-progress-bar" id="fadeBar"></div>
    </div>
    <span class="page-title">壹</span>

    <script>
        const memory = document.getElementById('memory');
        const fadeBar = document.getElementById('fadeBar');
        let isHovering = false;
        let fadeTimeout;
        let progress = 1;

        memory.addEventListener('mouseenter', () => {
            isHovering = true;
            clearTimeout(fadeTimeout);
            // 恢复透明度
            memory.querySelectorAll('.memory-line').forEach((line, i) => {
                line.style.transitionDelay = `${i * 0.1}s`;
                line.style.opacity = '0.85';
            });
            // 重置进度条
            progress = 1;
            fadeBar.style.transform = `scaleX(${progress})`;
        });

        memory.addEventListener('mouseleave', () => {
            isHovering = false;
            // 开始消散
            fadeTimeout = setTimeout(() => {
                fadeMemory();
            }, 500);
        });

        function fadeMemory() {
            if (isHovering) return;

            progress -= 0.002;
            fadeBar.style.transform = `scaleX(${Math.max(0, progress)})`;

            memory.querySelectorAll('.memory-line').forEach((line, i) => {
                const baseOpacity = 0.85;
                const currentOpacity = baseOpacity * Math.max(0, progress);
                line.style.opacity = currentOpacity.toFixed(3);
            });

            if (progress > 0) {
                requestAnimationFrame(fadeMemory);
            }
        }

        // 初始淡入
        setTimeout(() => {
            memory.querySelectorAll('.memory-line').forEach((line, i) => {
                setTimeout(() => {
                    line.style.opacity = '0.5';
                }, i * 400);
            });
        }, 1000);
    </script>
