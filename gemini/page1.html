<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房间01：光影的延迟</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background-color: #ebe7e0;
            color: #2c2a29;
            font-family: "Georgia", "Times New Roman", "PingFang SC", "Noto Serif CJK SC", serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: table;
            width: 100%;
        }
        .wrapper { display: table-cell; vertical-align: middle; text-align: center; padding: 0 40px; }
        .poem-container { max-width: 600px; margin: 0 auto; }
        .delayed-text {
            font-size: 16pt;
            line-height: 2;
            color: rgba(44, 42, 41, 0.15);
            text-shadow: 0 0 12px rgba(44, 42, 41, 0.8);
            transition: color 12s cubic-bezier(0.25, 1, 0.5, 1), 
                        text-shadow 15s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 15s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: default;
            user-select: none;
            display: block;
            margin-bottom: 40px;
        }
        .delayed-text:hover {
            color: rgba(44, 42, 41, 0.85);
            text-shadow: 35px 20px 25px rgba(74, 71, 68, 0.25);
            transform: translate(-5px, -2px);
        }
        .hint { font-size: 9pt; color: #9c978e; letter-spacing: 1px; margin-top: 80px; animation: pulse 3s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
        .back-link { display: inline-block; margin-top: 40px; font-size: 11pt; color: #1a535c; text-decoration: none; border-bottom: 1px dotted #1a535c; }
        .back-link:hover { color: #2c2a29; border-bottom: 1px solid #2c2a29; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="poem-container">
            <span class="delayed-text">
                你发送出去的那句早安，<br>
                至今还没有在对方的屏幕上亮起。<br>
                它像一颗意外熄灭的恒星，<br>
                虽然死去了，但微弱的光线<br>
                依旧在这个冰冷的网络里，独自赶路。
            </span>
            <div class="hint">—— 请将指针悬停在文本上，并保持静止，等待光影拉长 ——</div>
            <a href="index.html" class="back-link">← 返回大堂</a>
        </div>
    </div>

  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
