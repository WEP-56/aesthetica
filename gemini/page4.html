<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LEVIATHAN // ARCHIVE 04</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #030708; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* UI层 */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; padding: 40px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .meta-info { font-size: 11px; color: #3a4d52; line-height: 1.6; letter-spacing: 2px; }
        .meta-info span { color: #00ffaa; }

        .system-status {
            position: absolute; top: 40px; right: 40px;
            font-size: 11px; color: #3a4d52; text-align: right;
        }

        .back-btn {
            color: #55727a; font-size: 12px; text-decoration: none;
            letter-spacing: 2px; pointer-events: auto; width: fit-content;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #00ffaa; }
    </style>
</head>
<body>

    <canvas id="leviathanCanvas"></canvas>

    <div class="ui-layer">
        <div class="meta-info">
            <span>MODULE 04: NEURAL LEVIATHAN</span><br>
            KINEMATICS: INVERSE KINEMATICS SEGMENTATION // BIOMECHANICS: PROCEDURAL WAVE ANIMATION<br>
            [ INTERACTION: CLICK TO TRIGGER AN EMP NEURAL SHOCKWAVE ]
        </div>
        <div class="system-status" id="status-panel">NERVE IMPULSE: STABLE<br>SWARM COUNT: 400</div>
        <a href="index.html" class="back-btn">← RETURN TO NEXUS</a>
    </div>

    <script>
        const canvas = document.getElementById('leviathanCanvas');
        const ctx = canvas.getContext('2d');
        const statusPanel = document.getElementById('status-panel');
        
        let width, height;
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let time = 0;
        let empActive = false;
        let empRadius = 0;
        let empCenter = { x: 0, y: 0 };

        // 巨兽骨骼配置
        const segments = [];
        const numSegments = 28; // 脊椎节数
        const segmentLength = 22; // 节与节之间的固定物理距离

        // 发光微虫群（食物链底层结构）
        const swarm = [];
        const swarmCount = 400;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 初始化巨兽脊椎
        function initLeviathan() {
            let startX = width / 2;
            let startY = height / 2;
            for (let i = 0; i < numSegments; i++) {
                segments.push({
                    x: startX - i * segmentLength,
                    y: startY,
                    angle: 0,
                    // 身体粗细曲线：两头尖，中间粗（完美的流线型生物外壳）
                    radius: Math.sin((i / numSegments) * Math.PI) * 26 + 3
                });
            }
        }

        // 初始化微虫群
        function initSwarm() {
            for (let i = 0; i < swarmCount; i++) {
                swarm.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    speed: Math.random() * 1.5 + 0.5,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.4 + 0.2
                });
            }
        }

        // 逆向运动学核心算法 + 过程触手计算
        function updateLeviathan() {
            time += 0.04;

            // 1. 头部追踪鼠标（带流畅的物理惯性阻尼）
            let head = segments[0];
            let dx = mouse.x - head.x;
            let dy = mouse.y - head.y;
            head.angle = Math.atan2(dy, dx);
            
            // 如果处于 EMP 冲击中，神经抽搐，失去方向
            if (empActive) {
                head.x += (Math.sin(time * 5) * 8);
                head.y += (Math.cos(time * 5) * 8);
            } else {
                head.x += dx * 0.06;
                head.y += dy * 0.06;
            }

            // 2. 逆向骨骼约束链循环（后一节强行跟随前一节的屁股）
            for (let i = 1; i < numSegments; i++) {
                let prev = segments[i - 1];
                let curr = segments[i];

                let curDx = prev.x - curr.x;
                let curDy = prev.y - curr.y;
                curr.angle = Math.atan2(curDy, curDx);

                // 强制保持 segmentLength 的固定刚体距离
                curr.x = prev.x - Math.cos(curr.angle) * segmentLength;
                curr.y = prev.y - Math.sin(curr.angle) * segmentLength;
            }
        }

        function updateSwarm() {
            let head = segments[0];

            for (let i = 0; i < swarm.length; i++) {
                let p = swarm[i];

                // 如果激发了 EMP 冲击波，微虫受到能量排斥疯狂扩散
                if (empActive) {
                    let edx = p.x - empCenter.x;
                    let edy = p.y - empCenter.y;
                    let edist = Math.sqrt(edx*edx + edy*edy);
                    if (edist < empRadius && edist > 0) {
                        let force = (empRadius - edist) / empRadius * 8;
                        p.vx += (edx / edist) * force;
                        p.vy += (edy / edist) * force;
                    }
                }

                // 正常状态下：微虫被巨兽头部的光芒吸引（趋光性），但太靠近又会因恐惧逃逸
                let hdx = head.x - p.x;
                let hdy = head.y - p.y;
                let hdist = Math.sqrt(hdx*hdx + hdy*hdy);

                if (hdist < 300 && hdist > 60) {
                    p.vx += (hdx / hdist) * 0.05;
                    p.vy += (hdy / hdist) * 0.05;
                } else if (hdist <= 60) {
                    // 恐惧逃逸场
                    p.vx -= (hdx / hdist) * 0.2;
                    p.vy -= (hdy / hdist) * 0.2;
                }

                // 物理惯性阻尼与边界约束
                p.vx *= 0.95; p.vy *= 0.95;
                p.x += p.vx + (Math.random() - 0.5) * 0.3;
                p.y += p.vy + (Math.random() - 0.5) * 0.3;

                if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
            }
        }

        // 渲染视觉画面
        function draw() {
            // 极低半透明底色，渲染出深海特有的、粘稠高贵的长尾迹视觉
            ctx.fillStyle = 'rgba(3, 7, 8, 0.25)';
            ctx.fillRect(0, 0, width, height);

            // 叠加一层微弱的混合发光模式
            ctx.globalCompositeOperation = "screen";

            // 1. 绘制发光微虫群
            for (let i = 0; i < swarm.length; i++) {
                let p = swarm[i];
                ctx.fillStyle = `rgba(0, 255, 170, ${p.alpha})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }

            // 2. 绘制利维坦巨兽的外发光神经节
            for (let i = numSegments - 1; i >= 0; i--) {
                let seg = segments[i];

                // 计算垂直于脊椎方向的法向量（用于向左右两侧撑起发光的生态软骨）
                let lateralAngle1 = seg.angle + Math.PI / 2;
                let lateralAngle2 = seg.angle - Math.PI / 2;

                // 过程动画波：肋骨和外骨骼会随着时间呈正弦波状舒张收缩（拟态呼吸）
                let wave = Math.sin(time * 2 - i * 0.3) * 6;
                let currentRibLength = seg.radius + 6 + wave;

                let leftX = seg.x + Math.cos(lateralAngle1) * currentRibLength;
                let leftY = seg.y + Math.sin(lateralAngle1) * currentRibLength;
                let rightX = seg.x + Math.cos(lateralAngle2) * currentRibLength;
                let rightY = seg.y + Math.sin(lateralAngle2) * currentRibLength;

                // 绘制侧面发光触须（高精度的发光线条矩阵）
                if (i % 2 === 0 && i > 3) {
                    ctx.strokeStyle = `rgba(0, 213, 255, ${0.15 - (i / numSegments) * 0.1})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(seg.x, seg.y);
                    // 触须末端带有一点物理甩尾延迟
                    ctx.lineTo(leftX + Math.sin(time + i)*10, leftY);
                    ctx.moveTo(seg.x, seg.y);
                    ctx.lineTo(rightX - Math.sin(time + i)*10, rightY);
                    ctx.stroke();
                }

                // 绘制脊椎核心主躯干（皮层渐变色）
                ctx.fillStyle = `rgba(0, ${255 - i * 5}, ${170 + i * 3}, ${0.7 - (i / numSegments) * 0.5})`;
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, seg.radius, 0, Math.PI * 2);
                ctx.fill();

                // 绘制幽蓝色的中枢神经核
                if (i % 3 === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, Math.max(1, seg.radius * 0.25), 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 3. 绘制 EMP 脉冲震荡波
            if (empActive) {
                empRadius += 12;
                ctx.strokeStyle = `rgba(0, 255, 170, ${1 - empRadius / (width * 0.6)})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(empCenter.x, empCenter.y, empRadius, 0, Math.PI * 2);
                ctx.stroke();

                if (empRadius > width * 0.6) {
                    empActive = false;
                }
            }

            // 还原混合模式
            ctx.globalCompositeOperation = "source-over";
        }

        // 交互：点击释放电磁脉冲（EMP），重置神经元
        window.addEventListener('mousedown', (e) => {
            empActive = true;
            empRadius = 0;
            empCenter.x = e.clientX;
            empCenter.y = e.clientY;

            statusPanel.innerHTML = "<span style='color:#ff3366'>NERVE IMPULSE: PARALYZED</span><br>EM RADIATION: MAXIMUM";
            
            setTimeout(() => {
                statusPanel.innerHTML = "NERVE IMPULSE: STABLE<br>SWARM COUNT: 400";
            }, 2000);
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        function loop() {
            updateLeviathan();
            updateSwarm();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        
        // 启动生态场
        resize();
        initLeviathan();
        initSwarm();
        loop();
    </script>
</body>
</html>
