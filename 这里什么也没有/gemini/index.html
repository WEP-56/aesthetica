<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ORGANISM // DIGITAL TWIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Courier New', Courier, monospace;
            cursor: none;
        }
        
        /* 极简主义 UI 框架 */
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .interface {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
        }
        header h1 { font-size: 12px; color: #fff; font-weight: 400; }

        nav {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-self: flex-start;
            margin-top: auto;
            margin-bottom: auto;
        }

        .nav-item {
            font-size: 18px;
            color: #444;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: color 0.3s;
            pointer-events: auto;
            display: block;
            width: fit-content;
            position: relative;
            padding-left: 20px;
        }
        .nav-item::before {
            content: '▫';
            position: absolute;
            left: 0;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateX(-10px);
        }
        .nav-item:hover {
            color: #fff;
        }
        .nav-item:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            display: flex;
            justify-content: space-between;
            color: #333;
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* 自定义高级光标 */
        #custom-cursor {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="canvas-container">
        <canvas id="nexusCanvas"></canvas>
    </div>

    <div class="interface">
        <header>
            <h1>CYBER-ORGANISM ARCHIVE v1.0</h1>
            <div>[ STATUS: OPERATIONAL ]</div>
        </header>

        <nav id="menu">
            <a href="page1.html" class="nav-item" data-index="1">01 // Kinetic String Theory</a>
            <a href="page2.html" class="nav-item" data-index="2">02 // Emergent Biome</a>
            <a href="page3.html" class="nav-item" data-index="3">03 // Chronos Tearing</a>
			<a href="page4.html" class="nav-item" data-index="4">04 // Neural Leviathan</a>
        </nav>

        <footer>
            <div>DESIGNED BY AI // CODES EMITTED WITHOUT HUMAN INTERVENTION</div>
            <div>© 2026 ARCHIVE</div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('nexusCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        const navItems = document.querySelectorAll('.nav-item');

        let width, height;
        let particles = [];
        const particleCount = 1200;
        let mouse = { x: -1000, y: -1000, targetX: -1000, targetY: -1000, active: false };
        let currentAttractor = null; // 当前引力源位置

        const glyphs = "01X+ø∫∑√Ωλπµæ§¶".split("");

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 光标追踪
        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
            mouse.active = true;
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 监听菜单引力源
        navItems.forEach(item => {
            item.addEventListener('mouseenter', (e) => {
                cursor.style.transform = 'translate(-50%, -50%) scale(4)';
                const rect = item.getBoundingClientRect();
                currentAttractor = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2,
                    force: 1.5
                };
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                currentAttractor = null;
            });
        });

        // 粒子类定义
        class Particle {
            constructor() {
                this.reset();
                // 随机分布在中央星云圆内
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 150;
                this.x = width / 2 + Math.cos(angle) * radius;
                this.y = height / 2 + Math.sin(angle) * radius;
            }

            reset() {
                this.char = glyphs[Math.floor(Math.random() * glyphs.length)];
                this.baseX = width / 2;
                this.baseY = height / 2;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.speed = Math.random() * 0.02 + 0.01;
                this.angle = Math.random() * Math.PI * 2;
                this.orbitalRadius = Math.random() * 180 + 20;
                this.size = Math.random() * 8 + 6;
                this.alpha = Math.random() * 0.5 + 0.2;
            }

            update() {
                // 缓动追踪鼠标位置
                mouse.x += (mouse.targetX - mouse.x) * 0.1;
                mouse.y += (mouse.targetY - mouse.y) * 0.1;

                if (currentAttractor) {
                    // 当鼠标悬停在菜单上，粒子向菜单聚集（强引力场）
                    let dx = currentAttractor.x - this.x;
                    let dy = currentAttractor.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    this.vx += (dx / dist) * currentAttractor.force * Math.random();
                    this.vy += (dy / dist) * currentAttractor.force * Math.random();
                    this.vx *= 0.85;
                    this.vy *= 0.85;
                } else {
                    // 默认状态：绕中心黑洞做流体旋转
                    this.angle += this.speed;
                    let targetX = width / 2 + Math.cos(this.angle) * this.orbitalRadius;
                    let targetY = height / 2 + Math.sin(this.angle) * this.orbitalRadius;
                    
                    // 鼠标轻微推开粒子（斥力）
                    if (mouse.active) {
                        let mDx = this.x - mouse.x;
                        let mDy = this.y - mouse.y;
                        let mDist = Math.sqrt(mDx * mDx + mDy * mDy);
                        if (mDist < 120) {
                            let force = (120 - mDist) / 120;
                            targetX += (mDx / mDist) * force * 50;
                            targetY += (mDy / mDist) * force * 50;
                        }
                    }

                    this.vx += (targetX - this.x) * 0.05;
                    this.vy += (targetY - this.y) * 0.05;
                    this.vx *= 0.9;
                    this.vy *= 0.9;
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${currentAttractor ? this.alpha * 1.5 : this.alpha})`;
                ctx.font = `${this.size}px monospace`;
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        // 初始化
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 动效循环
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // 尾迹渲染，制造丝滑流体感
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 绘制微弱的几何连线（只在靠近时发生）
            if(currentAttractor) {
                ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                ctx.beginPath();
                for(let i=0; i<particles.length; i+=20) {
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(currentAttractor.x, currentAttractor.y);
                }
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
