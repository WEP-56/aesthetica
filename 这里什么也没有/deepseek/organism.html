<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有机呼吸体 · 生命模拟</title>
    <style>
        :root {
            --bg: #030308;
            --accent-warm: #ff7b42;
            --accent-cool: #42d0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        #organismCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 覆盖层 */
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 0.12em;
            color: #e8e8f0;
            text-shadow: 0 0 40px rgba(66, 208, 255, 0.4);
            line-height: 1.2;
        }

        .page-title .sub {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .back-link {
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            transition: all 0.4s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(20, 20, 35, 0.3);
        }

        .back-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .bottom-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .instruction {
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breath-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breath-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-warm);
            box-shadow: 0 0 15px var(--accent-warm);
            animation: breathe-dot 6s ease-in-out infinite;
        }

        @keyframes breathe-dot {
            0%,
            100% {
                transform: scale(0.7);
                background: var(--accent-cool);
                box-shadow: 0 0 15px var(--accent-cool);
            }
            50% {
                transform: scale(1.5);
                background: var(--accent-warm);
                box-shadow: 0 0 25px var(--accent-warm);
            }
        }

        .breath-text {
            letter-spacing: 0.08em;
        }

        @media (max-width: 600px) {
            .overlay {
                padding: 20px;
            }
            .page-title {
                font-size: 1.3rem;
            }
            .back-link {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <canvas id="organismCanvas"></canvas>

    <div class="overlay">
        <div class="top-info">
            <div class="page-title">
                有机呼吸体
                <span class="sub">Living Organism · 同步节律</span>
            </div>
            <a href="index.html" class="back-link">← 返回画廊</a>
        </div>
        <div class="bottom-info">
            <div class="instruction">
                <span>✦</span> 感受呼吸节律
            </div>
            <div class="breath-indicator">
                <span class="breath-text">呼吸</span>
                <span class="breath-dot"></span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('organismCanvas');
            const ctx = canvas.getContext('2d');

            let W, H, centerX, centerY;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                centerX = W / 2;
                centerY = H / 2;
            }
            resize();
            window.addEventListener('resize', resize);

            // ==================== 粒子系统 ====================
            const NUM_PARTICLES = 1200;
            const particles = [];

            // 每个粒子有球坐标参数和独立相位
            for (let i = 0; i < NUM_PARTICLES; i++) {
                const theta = Math.random() * Math.PI * 2; // 水平角
                const phi = Math.acos(2 * Math.random() - 1); // 垂直角（均匀分布在球面上）
                const baseRadius = 80 + Math.random() * 220; // 基础半径范围
                // 添加一些有机的变形：多个椭圆叠加
                const noiseX = Math.random() * 0.3;
                const noiseY = Math.random() * 0.3;
                const noiseZ = Math.random() * 0.3;
                // 旋转速度
                const angularSpeed = (Math.random() - 0.5) * 0.004;
                const phiSpeed = (Math.random() - 0.5) * 0.003;
                // 呼吸相位
                const breathePhase = Math.random() * Math.PI * 2;
                // 颜色偏向：暖色或冷色
                const colorBias = Math.random();
                particles.push({
                    theta,
                    phi,
                    baseRadius,
                    noiseX,
                    noiseY,
                    noiseZ,
                    angularSpeed,
                    phiSpeed,
                    breathePhase,
                    colorBias,
                    // 当前半径（用于变形）
                    currentRadius: baseRadius,
                });
            }

            // ==================== 呼吸参数 ====================
            const BREATHE_PERIOD = 7.5; // 呼吸周期（秒）
            let globalBreathe = 0; // 0到1之间，0=收缩，1=扩张

            // ==================== 鼠标交互 ====================
            let mouseX = centerX;
            let mouseY = centerY;
            let targetMouseX = centerX;
            let targetMouseY = centerY;
            let mouseInfluence = 0; // 0~1 鼠标对呼吸的影响程度

            window.addEventListener('mousemove', (e) => {
                targetMouseX = e.clientX;
                targetMouseY = e.clientY;
                mouseInfluence = 0.6;
            });
            window.addEventListener('mouseleave', () => {
                mouseInfluence = 0;
            });
            // 触摸支持
            window.addEventListener('touchmove', (e) => {
                targetMouseX = e.touches[0].clientX;
                targetMouseY = e.touches[0].clientY;
                mouseInfluence = 0.5;
            }, { passive: true });
            window.addEventListener('touchend', () => {
                mouseInfluence = 0;
            });

            // ==================== 背景星尘 ====================
            const dustParticles = [];
            const DUST_COUNT = 150;
            for (let i = 0; i < DUST_COUNT; i++) {
                dustParticles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1 + 0.3,
                    opacity: Math.random() * 0.6 + 0.2,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                });
            }

            function drawDust() {
                for (const d of dustParticles) {
                    d.x += d.vx;
                    d.y += d.vy;
                    if (d.x < 0) d.x = W;
                    if (d.x > W) d.x = 0;
                    if (d.y < 0) d.y = H;
                    if (d.y > H) d.y = 0;
                    ctx.fillStyle = `rgba(200,210,230,${d.opacity})`;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== 绘制有机体 ====================
            function drawOrganism(time) {
                // 计算全局呼吸值：正弦波，周期 BREATHE_PERIOD 秒
                const breatheRaw = Math.sin(time * 0.001 * (2 * Math.PI) / BREATHE_PERIOD);
                // 映射到0-1（收缩到扩张）
                globalBreathe = (breatheRaw + 1) / 2;

                // 鼠标平滑移动
                mouseX += (targetMouseX - mouseX) * 0.06;
                mouseY += (targetMouseY - mouseY) * 0.06;
                // 鼠标影响强度随时间衰减
                mouseInfluence *= 0.995;

                // 根据鼠标距离产生局部扰动
                const mouseDist = Math.sqrt((mouseX - centerX) ** 2 + (mouseY - centerY) ** 2);
                const mouseFactor = Math.min(1, mouseDist / 250) * mouseInfluence;

                // 动态偏移：鼠标位置对有机体中心的拉扯
                const offsetX = (mouseX - centerX) * 0.12 * mouseInfluence;
                const offsetY = (mouseY - centerY) * 0.12 * mouseInfluence;

                // 呼吸幅度
                const breatheAmplitude = 0.35;
                const breatheFactor = 0.65 + globalBreathe * breatheAmplitude; // 0.65 到 1.0

                // 颜色随呼吸变化：收缩时冷色，扩张时暖色
                const hueShift = globalBreathe * 40 - 10; // -10 到 30 色相偏移
                const baseHue = 200; // 冷蓝色基调
                const saturationBase = 60;
                const lightnessBase = 55;

                // 绘制粒子之间的连线（增强有机感）
                // 只绘制部分粒子之间的连线以节省性能
                ctx.strokeStyle = `rgba(255,255,255,0.04)`;
                ctx.lineWidth = 0.6;

                // 预先计算所有粒子位置
                const positions = [];
                for (const p of particles) {
                    // 更新粒子角度
                    p.theta += p.angularSpeed * (1 + mouseFactor * 0.5);
                    p.phi += p.phiSpeed * (1 + mouseFactor * 0.5);
                    // 保持phi在0-PI范围内
                    if (p.phi < 0) p.phi += Math.PI;
                    if (p.phi > Math.PI) p.phi -= Math.PI;

                    // 呼吸影响半径：基础半径 + 呼吸调制 + 个体相位微调
                    const individualBreathe = Math.sin(time * 0.001 * 2 + p.breathePhase) * 0.12;
                    const radius = p.baseRadius * (breatheFactor + individualBreathe);

                    // 有机变形：利用噪声产生不规则形状
                    const deformX = Math.sin(p.theta * 3 + p.noiseX * 8) * 15 * globalBreathe;
                    const deformY = Math.cos(p.phi * 2 + p.noiseY * 7) * 15 * globalBreathe;
                    const deformZ = Math.sin(p.theta * 2 + p.phi * 3 + p.noiseZ * 9) * 12 * globalBreathe;

                    // 球坐标转笛卡尔坐标
                    const sinPhi = Math.sin(p.phi);
                    const cosPhi = Math.cos(p.phi);
                    const sinTheta = Math.sin(p.theta);
                    const cosTheta = Math.cos(p.theta);

                    const rx = radius * sinPhi * cosTheta;
                    const ry = radius * cosPhi;
                    const rz = radius * sinPhi * sinTheta;

                    // 应用变形
                    const fx = rx + deformX;
                    const fy = ry + deformY;
                    const fz = rz + deformZ;

                    // 简单透视投影（不考虑旋转，保持有机体固定视角）
                    const perspective = 600;
                    const scale = perspective / (perspective + fz);
                    const projX = centerX + offsetX + fx * scale * 1.1;
                    const projY = centerY + offsetY - fy * scale * 1.1;

                    positions.push({
                        x: projX,
                        y: projY,
                        z: fz,
                        radius,
                        colorBias: p.colorBias,
                    });
                }

                // 按深度排序（远处先画）
                positions.sort((a, b) => a.z - b.z);

                // 绘制连线（少量，只连接相邻角度的粒子）
                // 跳过连线以保持清晰，或者只画很淡的连线
                // 这里选择不画连线，完全靠粒子密度表现

                // 绘制粒子
                for (const pos of positions) {
                    const depth = pos.z;
                    const t = Math.max(0, Math.min(1, (depth + 200) / 400)); // 归一化深度
                    const hue = baseHue + hueShift * t + pos.colorBias * 15;
                    const saturation = saturationBase + t * 25;
                    const lightness = lightnessBase + t * 15;
                    const alpha = 0.7 + t * 0.2;

                    // 大小随呼吸和深度变化
                    const size = (1.5 + globalBreathe * 1.2) * (1 - t * 0.3);

                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, Math.max(0.8, size), 0, Math.PI * 2);
                    ctx.fill();

                    // 对较亮的粒子添加辉光
                    if (globalBreathe > 0.7 && size > 2.0) {
                        ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.15)`;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, size * 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // ==================== 动画循环 ====================
            function animate(timestamp) {
                // 半透明背景，产生微弱的拖影
                ctx.fillStyle = 'rgba(3, 3, 8, 0.22)';
                ctx.fillRect(0, 0, W, H);

                drawDust();
                drawOrganism(timestamp);

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);

            // 窗口大小改变时更新中心点
            window.addEventListener('resize', () => {
                resize();
                for (const d of dustParticles) {
                    d.x = Math.min(d.x, W);
                    d.y = Math.min(d.y, H);
                }
            });

            console.log('%c有机呼吸体已就绪 %c🧬',
                'color:#42d0ff;font-size:14px;', 'font-size:20px;');
        })();
    </script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
