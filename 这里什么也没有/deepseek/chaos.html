<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌吸引子 · 洛伦兹蝴蝶</title>
    <style>
        :root {
            --bg: #050510;
            --text: #c8c8d4;
            --accent: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: grab;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        body:active {
            cursor: grabbing;
        }

        body.dragging {
            cursor: grabbing;
        }

        /* 主画布 */
        #chaosCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 覆盖层：文字信息 */
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 0.12em;
            color: #e8e8f0;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.4);
            line-height: 1.2;
        }

        .page-title .sub {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .back-link {
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            transition: all 0.4s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(20, 20, 35, 0.3);
        }

        .back-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .bottom-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .instruction {
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .instruction .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            font-size: 10px;
            line-height: 18px;
            text-align: center;
        }

        .coords {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .overlay {
                padding: 20px;
            }
            .page-title {
                font-size: 1.3rem;
            }
            .back-link {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <canvas id="chaosCanvas"></canvas>

    <div class="overlay">
        <div class="top-info">
            <div class="page-title">
                混沌吸引子
                <span class="sub">Lorenz Attractor · 确定性混沌</span>
            </div>
            <a href="index.html" class="back-link">← 返回画廊</a>
        </div>
        <div class="bottom-info">
            <div class="instruction">
                <span class="icon">↔</span> 拖拽旋转视角
            </div>
            <div class="coords" id="coordsDisplay">σ=10 ρ=28 β=8/3</div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('chaosCanvas');
            const ctx = canvas.getContext('2d');

            // ==================== 画布尺寸 ====================
            let W, H, centerX, centerY;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                centerX = W / 2;
                centerY = H / 2;
            }
            resize();
            window.addEventListener('resize', resize);

            // ==================== 洛伦兹参数 ====================
            const sigma = 10;
            const rho = 28;
            const beta = 8 / 3;
            const dt = 0.004; // 积分步长

            // ==================== 粒子系统 ====================
            const NUM_PARTICLES = 4500; // 粒子数量
            const TRAIL_LENGTH = 28; // 每个粒子的尾迹长度（绘制成线段）
            // 但我们使用一种更高效的方法：每个粒子存储位置历史，绘制成渐隐的线段
            // 或者直接绘制大量点，背景用半透明覆盖形成尾迹。这里选择后者：用半透明背景产生拖尾效果
            // 但要实现彩色渐变，还是用点绘制更好。
            // 我们将采用：存储粒子当前和历史位置，绘制成点，颜色基于深度。

            // 初始化粒子：从微小扰动开始
            const particles = [];
            const seedX = 0.1, seedY = 0, seedZ = 0;
            for (let i = 0; i < NUM_PARTICLES; i++) {
                // 在初始点周围极微小扰动，让轨迹自然分叉
                const perturb = 0.0001;
                particles.push({
                    x: seedX + (Math.random() - 0.5) * perturb,
                    y: seedY + (Math.random() - 0.5) * perturb,
                    z: seedZ + (Math.random() - 0.5) * perturb,
                    // 存储历史位置用于尾迹效果（我们直接不存历史，而是用半透明背景自然形成）
                });
            }

            // 预先计算所有粒子的路径？不，实时更新，这样才能支持旋转和持续动画。
            // 使用半透明背景实现拖尾。

            // ==================== 3D 投影与旋转 ====================
            let rotationX = 0.25; // 绕X轴旋转角度（俯仰）
            let rotationY = 0.5; // 绕Y轴旋转角度（偏航）
            let autoRotateSpeed = 0.12;
            let targetRotationX = rotationX;
            let targetRotationY = rotationY;
            let isDragging = false;
            let lastMouseX, lastMouseY;

            // 鼠标/触摸事件
            function onMouseDown(e) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                document.body.classList.add('dragging');
                e.preventDefault();
            }

            function onMouseMove(e) {
                if (!isDragging) return;
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                targetRotationY += dx * 0.005;
                targetRotationX += dy * 0.005;
                // 限制俯仰角度避免翻转
                targetRotationX = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, targetRotationX));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }

            function onMouseUp() {
                isDragging = false;
                document.body.classList.remove('dragging');
            }

            function onTouchStart(e) {
                if (e.touches.length === 1) {
                    isDragging = true;
                    lastMouseX = e.touches[0].clientX;
                    lastMouseY = e.touches[0].clientY;
                    document.body.classList.add('dragging');
                    e.preventDefault();
                }
            }

            function onTouchMove(e) {
                if (!isDragging || e.touches.length !== 1) return;
                const dx = e.touches[0].clientX - lastMouseX;
                const dy = e.touches[0].clientY - lastMouseY;
                targetRotationY += dx * 0.005;
                targetRotationX += dy * 0.005;
                targetRotationX = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, targetRotationX));
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
                e.preventDefault();
            }

            function onTouchEnd() {
                isDragging = false;
                document.body.classList.remove('dragging');
            }

            canvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd);

            // 防止右键菜单和拖拽图片行为
            canvas.addEventListener('contextmenu', e => e.preventDefault());

            // ==================== 星场背景（微弱的点缀） ====================
            const stars = [];
            const STAR_COUNT = 200;
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.3,
                    opacity: Math.random() * 0.5 + 0.2,
                    speed: Math.random() * 0.02 + 0.01,
                });
            }

            function drawStars() {
                for (const s of stars) {
                    s.y += s.speed;
                    if (s.y > H + 5) { s.y = -5;
                        s.x = Math.random() * W; }
                    ctx.fillStyle = `rgba(200,210,240,${s.opacity})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== 3D 投影函数 ====================
            function project(x, y, z) {
                // 应用旋转：先绕Y轴，再绕X轴
                const cosY = Math.cos(rotationY);
                const sinY = Math.sin(rotationY);
                const cosX = Math.cos(rotationX);
                const sinX = Math.sin(rotationX);

                // 绕Y轴旋转
                const x1 = x * cosY + z * sinY;
                const z1 = -x * sinY + z * cosY;
                const y1 = y;

                // 绕X轴旋转
                const y2 = y1 * cosX - z1 * sinX;
                const z2 = y1 * sinX + z1 * cosX;
                const x2 = x1;

                // 投影缩放（透视）
                const scale = 420; // 视距
                const depthFactor = scale / (scale + z2);
                const projX = centerX + x2 * depthFactor * 6.5; // 缩放系数调整大小
                const projY = centerY - y2 * depthFactor * 6.5;
                return { x: projX, y: projY, z: z2, depthFactor };
            }

            // ==================== 更新粒子（积分洛伦兹方程） ====================
            function updateParticles() {
                for (const p of particles) {
                    const dx = sigma * (p.y - p.x) * dt;
                    const dy = (p.x * (rho - p.z) - p.y) * dt;
                    const dz = (p.x * p.y - beta * p.z) * dt;
                    p.x += dx;
                    p.y += dy;
                    p.z += dz;
                }
            }

            // ==================== 绘制粒子（带深度着色） ====================
            function drawParticles() {
                // 计算所有投影点，批量绘制以提高性能
                const projected = particles.map(p => {
                    const proj = project(p.x, p.y, p.z);
                    return { ...proj, z: proj.z };
                });

                // 按深度排序（远处先画，近处覆盖），实现正确的遮挡感
                projected.sort((a, b) => a.z - b.z);

                // 归一化深度用于颜色映射
                // 洛伦兹吸引子的Z值大致范围在 0 到 50 左右，但需要动态计算
                // 这里简单使用固定的范围映射颜色
                const zMin = 0;
                const zMax = 45;

                for (const pt of projected) {
                    const depth = pt.z;
                    // 将深度映射到色相：近处暖色（红-橙），远处冷色（蓝-紫）
                    const t = Math.max(0, Math.min(1, (depth - zMin) / (zMax - zMin)));
                    // 使用 HSL 色彩空间：色相从 0 (红) 到 260 (紫蓝)
                    const hue = (1 - t) * 30 + t * 260; // 红~蓝紫渐变
                    const saturation = 80;
                    const lightness = 55 + t * 15; // 远处更亮一些增强对比
                    const alpha = 0.85 - t * 0.25; // 远处稍微透明

                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    ctx.beginPath();
                    // 根据深度调整点的大小，远处略小
                    const size = (1.4 - t * 0.5) * (pt.depthFactor || 1);
                    ctx.arc(pt.x, pt.y, Math.max(0.6, size), 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== 动画循环 ====================
            let time = 0;
            function animate(timestamp) {
                // 自动旋转（如果不拖拽）
                if (!isDragging) {
                    targetRotationY += autoRotateSpeed * 0.016; // 基于时间的增量
                }

                // 平滑旋转
                rotationY += (targetRotationY - rotationY) * 0.08;
                rotationX += (targetRotationX - rotationX) * 0.08;

                // 半透明背景，实现拖尾效果
                ctx.fillStyle = 'rgba(5, 5, 16, 0.18)';
                ctx.fillRect(0, 0, W, H);

                // 绘制星场
                drawStars();

                // 更新粒子位置
                updateParticles();

                // 绘制粒子
                drawParticles();

                // 调整星场位置随窗口大小
                for (const s of stars) {
                    if (s.x > W) s.x = 0;
                    if (s.x < 0) s.x = W;
                }

                time = timestamp;
                requestAnimationFrame(animate);
            }

            // 启动动画
            requestAnimationFrame(animate);

            // 窗口大小变化时更新星场范围
            window.addEventListener('resize', () => {
                for (const s of stars) {
                    s.x = Math.min(s.x, W);
                    s.y = Math.min(s.y, H);
                }
            });

            // 可选：显示坐标信息更新
            setInterval(() => {
                const coordsEl = document.getElementById('coordsDisplay');
                if (coordsEl) {
                    coordsEl.textContent = `σ=${sigma} ρ=${rho} β=${beta.toFixed(1)} · 粒子 ${NUM_PARTICLES}`;
                }
            }, 2000);

            console.log('%c混沌吸引子已就绪 %c🦋',
                'color:#ff6b6b;font-size:14px;', 'font-size:20px;');
        })();
    </script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
