<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨 · 蒸发 · 符号无常</title>
    <style>
        :root {
            --bg: #141210;
            --accent: #a29bfe;
            --text: #d0c8bc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: crosshair;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        #evaporateCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 覆盖层 */
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 0.15em;
            color: #d8d0c4;
            text-shadow: 0 0 30px rgba(162, 155, 254, 0.5);
            line-height: 1.2;
            writing-mode: horizontal-tb;
        }

        .page-title .sub {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(200, 190, 170, 0.5);
            margin-top: 6px;
        }

        .back-link {
            pointer-events: auto;
            color: rgba(220, 210, 190, 0.6);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            padding: 8px 16px;
            border: 1px solid rgba(200, 190, 170, 0.2);
            border-radius: 30px;
            transition: all 0.4s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(30, 25, 20, 0.3);
        }

        .back-link:hover {
            color: #fff;
            border-color: rgba(200, 190, 170, 0.5);
            background: rgba(200, 190, 170, 0.08);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .bottom-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: rgba(200, 190, 170, 0.35);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .instruction {
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .philosophy-text {
            font-family: 'KaiTi', 'STKaiti', 'SimSun', serif;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .overlay {
                padding: 20px;
            }
            .page-title {
                font-size: 1.3rem;
            }
            .back-link {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <canvas id="evaporateCanvas"></canvas>

    <div class="overlay">
        <div class="top-info">
            <div class="page-title">
                墨 · 蒸发
                <span class="sub">Ephemeral Ink · 符号无常</span>
            </div>
            <a href="index.html" class="back-link">← 返回画廊</a>
        </div>
        <div class="bottom-info">
            <div class="instruction">
                <span>☯</span> 微风随指尖流动
            </div>
            <div class="philosophy-text">万物生于有，有生于无</div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('evaporateCanvas');
            const ctx = canvas.getContext('2d');

            let W, H;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            // ==================== 字符库 ====================
            const SYMBOLS = [
                // 数学符号
                '∑', '∫', '∂', '∆', '∞', '√', '∛', '∴', '∵', '∮', '∇', '∈', '∉', '≈', '≠', '≤', '≥',
                // 汉字偏旁部首
                '⼀', '⼁', '⼂', '⼃', '⼄', '⼅', '⼆', '⼇', '⼈', '⼉', '⼊', '⼋', '⼌', '⼍', '⼎', '⼏',
                '⼐', '⼑', '⼒', '⼓', '⼔', '⼕', '⼖', '⼗', '⼘', '⼙', '⼚', '⼛', '⼜', '⼝', '⼞', '⼟',
                '⼠', '⼡', '⼢', '⼣', '⼤', '⼥', '⼦', '⼧', '⼨', '⼩', '⼪', '⼫', '⼬', '⼭', '⼮', '⼯',
                '⼺', '⼻', '⼼', '⼽', '⼾', '⼿', '⽀', '⽁', '⽂', '⽃', '⽄', '⽅', '⽆', '⽇', '⽈', '⽉',
                '⺁', '⺂', '⺃', '⺄', '⺆', '⺇', '⺈', '⺉', '⺊', '⺋', '⺌', '⺍', '⺒', '⺓', '⺔', '⺕',
                '⺖', '⺗', '⺘', '⺙', '⺛', '⺜', '⺝', '⺞', '⺟', '⺠', '⺡', '⺢', '⺣', '⺤', '⺥', '⺦',
                '⺧', '⺨', '⺩', '⺪', '⺫', '⺬', '⺭', '⺮', '⺯', '⺰', '⺱', '⺲', '⺳', '⺴', '⺵', '⺶',
                '⺷', '⺸', '⺹', '⺺', '⺻', '⺼', '⺽', '⺾', '⺿', '⻀', '⻁', '⻂', '⻃', '⻄', '⻅', '⻆',
                // 常用汉字部件
                '人', '口', '手', '心', '水', '火', '木', '金', '土', '日', '月', '山', '石', '田', '刀', '力',
                '之', '也', '不', '而', '子', '女', '大', '小', '上', '下', '中', '门', '页', '马', '鸟', '虫',
            ];

            // ==================== 粒子系统 ====================
            const MAX_PARTICLES = 90;
            const particles = [];

            // 粒子状态枚举
            const State = {
                FALLING: 'falling',
                SPREADING: 'spreading',
                FADING: 'fading' // 最后蒸发阶段
            };

            function createParticle(x, y, state) {
                const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                const fontSize = 16 + Math.random() * 28;
                const landY = y !== undefined ? y : H * (0.55 + Math.random() * 0.35); // 着陆点偏下
                const spreadMax = 18 + Math.random() * 45;
                const spreadSpeed = 0.4 + Math.random() * 1.8;
                const fadeSpeed = 0.002 + Math.random() * 0.008;
                const vy = 0.6 + Math.random() * 1.4;
                const wobbleAmp = 0.3 + Math.random() * 1.2;
                const wobbleFreq = 0.01 + Math.random() * 0.03;

                return {
                    symbol,
                    fontSize,
                    x: x !== undefined ? x : Math.random() * W,
                    y: y !== undefined ? y : -20 - Math.random() * 100,
                    vy,
                    wobbleAmp,
                    wobbleFreq,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    landY,
                    state: state || State.FALLING,
                    spreadRadius: 0,
                    spreadMax,
                    spreadSpeed,
                    life: 1.0, // 1 到 0
                    fadeSpeed,
                    // 墨滴颜色（暖灰）
                    inkHue: 30 + Math.random() * 20, // 30~50 色相
                    inkSaturation: 5 + Math.random() * 10,
                    inkLightness: 20 + Math.random() * 25, // 20~45 明度
                };
            }

            // 初始化粒子池
            function initParticles() {
                particles.length = 0;
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    // 部分粒子一开始就处于着陆晕染状态，营造画面已有的墨迹感
                    const rand = Math.random();
                    let state = State.FALLING;
                    let y = undefined;
                    let x = undefined;
                    if (rand < 0.2) {
                        // 已经在扩散的墨迹
                        state = State.SPREADING;
                        y = H * (0.55 + Math.random() * 0.35);
                        x = Math.random() * W;
                    } else if (rand < 0.35) {
                        // 正在淡出的墨迹
                        state = State.FADING;
                        y = H * (0.55 + Math.random() * 0.35);
                        x = Math.random() * W;
                    }
                    const p = createParticle(x, y, state);
                    if (state === State.SPREADING) {
                        p.spreadRadius = Math.random() * p.spreadMax * 0.7;
                        p.life = 0.6 + Math.random() * 0.4;
                    } else if (state === State.FADING) {
                        p.spreadRadius = p.spreadMax * (0.7 + Math.random() * 0.3);
                        p.life = 0.1 + Math.random() * 0.3;
                    }
                    particles.push(p);
                }
            }

            initParticles();
            // 窗口大小改变时重新初始化位置（保持逻辑）
            window.addEventListener('resize', () => {
                for (const p of particles) {
                    if (p.state === State.SPREADING || p.state === State.FADING) {
                        p.y = Math.min(p.y, H * 0.95);
                        p.landY = Math.min(p.landY, H * 0.95);
                    }
                }
            });

            // ==================== 鼠标交互（微风） ====================
            let mouseX = W / 2;
            let mouseY = H / 2;
            let windX = 0;
            let windY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                // 微风方向：鼠标位置相对于中心产生风力向量
                windX = (mouseX / W - 0.5) * 1.8;
                windY = (mouseY / H - 0.5) * 0.6; // 垂直风力较小
            });
            window.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                mouseX = touch.clientX;
                mouseY = touch.clientY;
                windX = (mouseX / W - 0.5) * 1.8;
                windY = (mouseY / H - 0.5) * 0.6;
            }, { passive: true });
            window.addEventListener('mouseleave', () => {
                windX = 0;
                windY = 0;
            });
            window.addEventListener('touchend', () => {
                windX = 0;
                windY = 0;
            });

            // ==================== 更新粒子 ====================
            function updateParticles() {
                for (const p of particles) {
                    switch (p.state) {
                        case State.FALLING:
                            // 风力影响
                            const windEffectX = windX * 0.6;
                            const windEffectY = windY * 0.3;
                            // 飘落并左右摇摆
                            p.y += p.vy + windEffectY;
                            p.x += windEffectX + Math.sin(p.y * p.wobbleFreq + p.wobbleOffset) * p.wobbleAmp;
                            // 边界回弹（或直接消失到另一边）
                            if (p.x < -30) p.x = W + 30;
                            if (p.x > W + 30) p.x = -30;
                            // 着陆检测
                            if (p.y >= p.landY) {
                                p.y = p.landY;
                                p.state = State.SPREADING;
                                p.spreadRadius = 0;
                            }
                            break;

                        case State.SPREADING:
                            // 晕染扩散
                            p.spreadRadius += p.spreadSpeed;
                            if (p.spreadRadius >= p.spreadMax) {
                                p.state = State.FADING;
                            }
                            // 生命值缓慢减少（在扩散阶段后期开始减少）
                            if (p.spreadRadius > p.spreadMax * 0.5) {
                                p.life -= p.fadeSpeed * 0.6;
                            }
                            break;

                        case State.FADING:
                            // 蒸发淡出
                            p.life -= p.fadeSpeed;
                            if (p.life <= 0.02) {
                                // 重生为新的下落粒子
                                const newP = createParticle(undefined, undefined, State.FALLING);
                                Object.assign(p, newP);
                            }
                            break;
                    }
                }

                // 确保粒子总数，如果某些粒子消耗了（但我们已经用重生机制，总数不变）
                // 偶尔添加一个粒子如果少于最大数？不需要。
            }

            // ==================== 绘制水墨纹理 ====================
            function drawInkStain(x, y, radius, life, hue, saturation, lightness) {
                if (radius <= 0.5 || life <= 0.01) return;

                // 多层径向渐变模拟宣纸晕染效果
                // 第一层：大而淡的边缘
                const alpha1 = life * 0.12;
                if (alpha1 > 0.005) {
                    const gradient1 = ctx.createRadialGradient(x, y, radius * 0.4, x, y, radius * 1.3);
                    gradient1.addColorStop(0, `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha1 * 0.8})`);
                    gradient1.addColorStop(0.6, `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha1 * 0.4})`);
                    gradient1.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient1;
                    ctx.beginPath();
                    ctx.arc(x, y, radius * 1.3, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 第二层：中等浓度的核心
                const alpha2 = life * 0.28;
                if (alpha2 > 0.01) {
                    const gradient2 = ctx.createRadialGradient(x, y, radius * 0.1, x, y, radius * 0.8);
                    gradient2.addColorStop(0, `hsla(${hue}, ${saturation}%, ${Math.max(10, lightness - 8)}%, ${alpha2})`);
                    gradient2.addColorStop(0.5, `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha2 * 0.7})`);
                    gradient2.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient2;
                    ctx.beginPath();
                    ctx.arc(x, y, radius * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 第三层：中心深色墨点
                const alpha3 = life * 0.45;
                if (alpha3 > 0.02 && radius > 3) {
                    const gradient3 = ctx.createRadialGradient(x, y, 0, x, y, radius * 0.3);
                    gradient3.addColorStop(0, `hsla(${hue}, ${saturation}%, ${Math.max(5, lightness - 12)}%, ${alpha3})`);
                    gradient3.addColorStop(0.7, `hsla(${hue}, ${saturation}%, ${lightness - 5}%, ${alpha3 * 0.5})`);
                    gradient3.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient3;
                    ctx.beginPath();
                    ctx.arc(x, y, radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 绘制字符（飘落中或墨迹上的残影）
            function drawSymbol(p) {
                if (p.life <= 0.02) return;
                const alpha = p.state === State.FALLING ? 0.85 : p.life * 0.7;
                ctx.font = `${p.fontSize}px "KaiTi", "STKaiti", "SimSun", "Microsoft YaHei", serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lightness = p.inkLightness + (p.state === State.FALLING ? 15 : 5);
                ctx.fillStyle = `hsla(${p.inkHue}, ${p.inkSaturation}%, ${lightness}%, ${alpha})`;
                // 略微偏移以模拟墨迹散开
                const offsetX = p.state === State.SPREADING ? (Math.random() - 0.5) * p.spreadRadius * 0.5 : 0;
                const offsetY = p.state === State.SPREADING ? (Math.random() - 0.5) * p.spreadRadius * 0.3 : 0;
                ctx.fillText(p.symbol, p.x + offsetX, p.y + offsetY);
            }

            // ==================== 绘制场景 ====================
            function drawScene() {
                // 用极低不透明度的暖黑背景覆盖，形成拖影和蒸发效果
                ctx.fillStyle = 'rgba(20, 18, 15, 0.12)';
                ctx.fillRect(0, 0, W, H);

                // 先绘制所有墨迹（让墨迹在字符下方）
                for (const p of particles) {
                    if (p.state === State.SPREADING || p.state === State.FADING) {
                        drawInkStain(p.x, p.y, p.spreadRadius, p.life, p.inkHue, p.inkSaturation, p.inkLightness);
                    }
                }

                // 再绘制所有字符（飘落的和墨迹上的残字）
                for (const p of particles) {
                    drawSymbol(p);
                }
            }

            // ==================== 动画循环 ====================
            function animate() {
                updateParticles();
                drawScene();
                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);

            console.log('%c墨·蒸发 已就绪 %c☯',
                'color:#a29bfe;font-size:14px;', 'font-size:20px;');
        })();
    </script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
