<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RITE 02 // 声纹城市</title>
  <style>
    :root {
      --paper: #f4efe6;
      --ink: #080909;
      --line: rgba(244, 239, 230, 0.16);
      --dim: rgba(244, 239, 230, 0.64);
      --gold: #f3bd63;
      --cyan: #42e6d2;
      --rose: #ff5d8f;
      --violet: #9d7cff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .scan {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 11%, transparent 80%, rgba(0,0,0,0.46)),
        repeating-linear-gradient(0deg, rgba(244,239,230,0.035) 0 1px, transparent 1px 5px);
      mix-blend-mode: overlay;
      opacity: 0.68;
    }

    header {
      position: fixed;
      inset: 28px 30px auto;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
      gap: 28px;
      align-items: start;
      pointer-events: none;
    }

    a, button { pointer-events: auto; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back, .readout, .mode {
      font-family: "Consolas", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .back {
      display: inline-block;
      color: var(--dim);
      font-size: 12px;
      border-bottom: 1px solid rgba(244,239,230,0.28);
      padding-bottom: 6px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 8.8vw, 126px);
      line-height: 0.88;
      letter-spacing: 0;
      font-weight: 760;
    }

    .intent {
      margin: 38px 0 0;
      color: rgba(244,239,230,0.72);
      line-height: 1.8;
      font-size: 14px;
      text-align: right;
    }

    .dock {
      position: fixed;
      left: 30px;
      right: 30px;
      bottom: 26px;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      pointer-events: none;
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(4, minmax(72px, 120px));
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
      max-width: 540px;
      pointer-events: auto;
    }

    .readout span {
      display: block;
      background: rgba(8,9,9,0.66);
      padding: 12px;
      color: var(--dim);
      font-size: 10px;
    }

    .readout b {
      display: block;
      color: var(--paper);
      font-size: 18px;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .modes {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      min-width: 82px;
      height: 44px;
      border: 1px solid rgba(244,239,230,0.22);
      background: rgba(8,9,9,0.58);
      color: var(--dim);
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(16px);
    }

    button[aria-pressed="true"] {
      color: var(--cyan);
      border-color: var(--cyan);
      box-shadow: inset 0 0 24px rgba(66,230,210,0.12), 0 0 22px rgba(66,230,210,0.12);
    }

    @media (max-width: 800px) {
      header {
        inset: 20px 20px auto;
        display: block;
      }
      .intent {
        text-align: left;
        max-width: 340px;
        margin-top: 18px;
        font-size: 12px;
      }
      .dock {
        left: 20px;
        right: 20px;
        bottom: 20px;
        grid-template-columns: 1fr;
      }
      .readout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .modes { justify-content: space-between; }
      button { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body>
  <canvas id="city"></canvas>
  <div class="scan"></div>

  <header>
    <div>
      <a class="back" href="index.html">← DIGITAL RITES</a>
      <h1>声纹<br>城市</h1>
    </div>
    <p class="intent">
      创作意图：把不存在的声音翻译成城市剖面。高楼是频段，道路是节拍，光流是采样点，鼠标的位置决定这座夜景的驾驶速度和偏航。
    </p>
  </header>

  <div class="dock">
    <div class="readout" aria-label="实时参数">
      <span>tempo <b id="tempo">128</b></span>
      <span>yaw <b id="yaw">0.00</b></span>
      <span>gain <b id="gain">0.70</b></span>
      <span>blocks <b id="blocks">96</b></span>
    </div>
    <div class="modes" aria-label="节奏模式">
      <button type="button" data-mode="pulse" aria-pressed="true">PULSE</button>
      <button type="button" data-mode="drift" aria-pressed="false">DRIFT</button>
      <button type="button" data-mode="storm" aria-pressed="false">STORM</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("city");
    const ctx = canvas.getContext("2d");
    const tempoEl = document.getElementById("tempo");
    const yawEl = document.getElementById("yaw");
    const gainEl = document.getElementById("gain");
    const blocksEl = document.getElementById("blocks");
    const modeButtons = [...document.querySelectorAll("button[data-mode]")];
    const pointer = { x: 0.5, y: 0.54, active: false };
    const bars = new Array(96).fill(0).map((_, i) => ({
      phase: Math.random() * 10,
      base: 0.22 + Math.random() * 0.78,
      band: i / 95,
      value: 0
    }));
    let mode = "pulse";
    let dpr = 1;
    let time = 0;
    let streaks = [];

    function resize() {
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      streaks = new Array(90).fill(0).map(() => ({
        lane: Math.random() > 0.5 ? 1 : -1,
        z: Math.random(),
        speed: 0.003 + Math.random() * 0.009,
        hue: Math.random()
      }));
    }

    function mix(a, b, t) { return a + (b - a) * t; }

    function frequencyValue(bar, t, gain) {
      const drift = Math.sin(t * (0.7 + bar.band * 2.2) + bar.phase) * 0.5 + 0.5;
      const beat = Math.pow(Math.sin(t * 2.8 + bar.band * 14) * 0.5 + 0.5, mode === "storm" ? 4 : 2);
      const wave = mode === "drift" ? drift : mix(drift, beat, mode === "storm" ? 0.82 : 0.54);
      const ridge = Math.sin(bar.band * Math.PI * 5 + t * 1.4) * 0.5 + 0.5;
      bar.value += ((wave * 0.7 + ridge * 0.3) * bar.base * gain - bar.value) * 0.12;
      return bar.value;
    }

    function project(x, z, yaw) {
      const horizon = innerHeight * 0.47;
      const depth = 1 / (z * 2.7 + 0.18);
      return {
        x: innerWidth / 2 + (x + yaw * (1 - z) * 260) * depth,
        y: horizon + (innerHeight * 0.58) * depth * 0.22,
        scale: depth
      };
    }

    function drawRoad(yaw, speed) {
      const horizon = innerHeight * 0.47;
      const bottom = innerHeight + 60;
      const roadTop = innerWidth * 0.08;
      const roadBottom = innerWidth * 0.72;
      const grad = ctx.createLinearGradient(0, horizon, 0, bottom);
      grad.addColorStop(0, "rgba(66,230,210,0.02)");
      grad.addColorStop(1, "rgba(66,230,210,0.18)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(innerWidth / 2 - roadTop + yaw * 110, horizon);
      ctx.lineTo(innerWidth / 2 + roadTop + yaw * 110, horizon);
      ctx.lineTo(innerWidth / 2 + roadBottom, bottom);
      ctx.lineTo(innerWidth / 2 - roadBottom, bottom);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(244,239,230,0.16)";
      ctx.lineWidth = 1;
      for (let i = -4; i <= 4; i++) {
        ctx.beginPath();
        ctx.moveTo(innerWidth / 2 + i * 28 + yaw * 110, horizon);
        ctx.lineTo(innerWidth / 2 + i * innerWidth * 0.11, bottom);
        ctx.stroke();
      }
      for (let k = 0; k < 24; k++) {
        const z = ((k / 24 + time * speed * 0.42) % 1);
        const y = mix(horizon, bottom, Math.pow(z, 2.2));
        const width = mix(roadTop, roadBottom, Math.pow(z, 1.6));
        ctx.strokeStyle = `rgba(243,189,99,${0.12 + z * 0.28})`;
        ctx.beginPath();
        ctx.moveTo(innerWidth / 2 - width, y);
        ctx.lineTo(innerWidth / 2 + width, y);
        ctx.stroke();
      }
    }

    function drawBuildings(yaw, gain) {
      const columns = 48;
      const gap = innerWidth / columns;
      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < columns; i++) {
          const bar = bars[(i * 2 + (side > 0 ? 1 : 0)) % bars.length];
          const value = frequencyValue(bar, time, gain);
          const z = (i / columns) * 0.86 + 0.08;
          const p = project(side * (180 + i * gap * 1.24), z, yaw);
          const bw = Math.max(4, gap * p.scale * 0.95);
          const bh = value * innerHeight * 0.42 * p.scale + 18;
          const x = p.x - bw / 2;
          const y = p.y - bh;
          const alpha = Math.min(0.8, 0.18 + value * 0.6);
          const color = side > 0 ? `rgba(66,230,210,${alpha})` : `rgba(255,93,143,${alpha})`;
          ctx.fillStyle = `rgba(8,9,9,${0.48 + z * 0.28})`;
          ctx.fillRect(x - 2, y - 2, bw + 4, bh + 4);
          ctx.fillStyle = color;
          ctx.fillRect(x, y, bw, bh);
          ctx.fillStyle = "rgba(244,239,230,0.72)";
          for (let wy = y + 8; wy < p.y - 8; wy += 15 * p.scale + 5) {
            if (Math.sin(wy * 0.09 + i + time * 3) > 0.25) {
              ctx.fillRect(x + bw * 0.22, wy, Math.max(1, bw * 0.14), 2);
              ctx.fillRect(x + bw * 0.62, wy, Math.max(1, bw * 0.14), 2);
            }
          }
        }
      }
    }

    function drawStreaks(yaw, speed) {
      ctx.lineWidth = 2;
      for (const s of streaks) {
        s.z = (s.z + s.speed * speed * 16) % 1;
        const x = s.lane * mix(36, innerWidth * 0.28, Math.pow(s.z, 1.8));
        const p1 = project(x, s.z, yaw);
        const p2 = project(x, Math.max(0, s.z - 0.045), yaw);
        ctx.strokeStyle = s.hue > 0.52 ? "rgba(66,230,210,0.58)" : "rgba(243,189,99,0.5)";
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }

    function drawSky(gain) {
      const grad = ctx.createLinearGradient(0, 0, 0, innerHeight);
      grad.addColorStop(0, "#080909");
      grad.addColorStop(0.46, "rgba(12,16,18,1)");
      grad.addColorStop(1, "rgba(2,4,5,1)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      const horizon = innerHeight * 0.47;
      ctx.strokeStyle = `rgba(66,230,210,${0.26 + gain * 0.22})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x <= innerWidth; x += 8) {
        const y = horizon + Math.sin(x * 0.018 + time * 2.1) * 10 + Math.sin(x * 0.006 - time) * 18;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function frame() {
      const yaw = (pointer.x - 0.5) * 1.1;
      const gain = mode === "storm" ? 0.92 : mode === "drift" ? 0.48 : 0.7;
      const speed = (mode === "drift" ? 0.6 : mode === "storm" ? 1.55 : 1) + (1 - pointer.y) * 0.55;
      time += 0.012 * speed;

      drawSky(gain);
      drawRoad(yaw, speed);
      drawBuildings(yaw, gain);
      drawStreaks(yaw, speed);

      tempoEl.textContent = Math.round(96 + speed * 42);
      yawEl.textContent = yaw.toFixed(2);
      gainEl.textContent = gain.toFixed(2);
      blocksEl.textContent = String(bars.length);
      requestAnimationFrame(frame);
    }

    modeButtons.forEach((button) => button.addEventListener("click", () => {
      mode = button.dataset.mode;
      modeButtons.forEach((item) => item.setAttribute("aria-pressed", String(item === button)));
    }));
    addEventListener("pointermove", (event) => {
      pointer.x = event.clientX / innerWidth;
      pointer.y = event.clientY / innerHeight;
      pointer.active = true;
    });
    addEventListener("resize", resize);
    resize();
    frame();
  </script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
