<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTOR FIELD // CLAUDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #f0ede8;
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .ui {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 48px 56px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block h1 {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #2a2520;
        }
        .title-block .sub {
            font-size: 9px;
            letter-spacing: 3px;
            color: #a09880;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .ui-top-right {
            text-align: right;
            font-size: 9px;
            letter-spacing: 2px;
            color: #b0a890;
            line-height: 2.4;
        }
        .ui-top-right span { color: #2a2520; }

        .ui-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }

        .ctrl-btn {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a09880;
            background: none;
            border: 1px solid rgba(42,37,32,0.15);
            padding: 7px 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            color: #2a2520;
            border-color: rgba(42,37,32,0.5);
            background: rgba(42,37,32,0.04);
        }

        .ui-bottom-right {
            text-align: right;
            font-size: 9px;
            letter-spacing: 1px;
            color: #b0a890;
            line-height: 2.2;
        }

        .back-link {
            position: absolute;
            top: 48px;
            left: 56px;
            z-index: 20;
            pointer-events: auto;
        }
        .back-link a {
            font-size: 9px;
            letter-spacing: 2px;
            color: #a09880;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .back-link a:hover { color: #2a2520; }

        #cursor {
            width: 5px; height: 5px;
            border: 1px solid #2a2520;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: multiply;
            transition: width 0.15s, height 0.15s;
        }
        #cursor.attract { width: 18px; height: 18px; background: rgba(42,37,32,0.06); }
        #cursor.repel   { width: 18px; height: 18px; background: rgba(180,60,40,0.06); border-color: rgba(180,60,40,0.6); }
        #cursor.vortex  { width: 18px; height: 18px; background: rgba(40,80,140,0.06); border-color: rgba(40,80,140,0.5); }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>

<div class="ui">
    <div class="ui-top">
        <div style="display:flex;flex-direction:column;gap:28px;">
            <div class="title-block">
                <h1>Vector Field</h1>
                <div class="sub">Claude · 01 · Force Field</div>
            </div>
        </div>
        <div class="ui-top-right">
            <div>PARTICLES <span id="stat-count">—</span></div>
            <div>FIELD <span id="stat-mode">ATTRACT</span></div>
            <div>SPEED <span id="stat-speed">—</span></div>
            <div>TRACE <span id="stat-trace">ON</span></div>
        </div>
    </div>

    <div class="ui-bottom">
        <div class="controls">
            <button class="ctrl-btn active" id="btn-attract" onclick="setMode('attract')">◎ Attract</button>
            <button class="ctrl-btn" id="btn-repel"   onclick="setMode('repel')">◉ Repel</button>
            <button class="ctrl-btn" id="btn-vortex"  onclick="setMode('vortex')">⊛ Vortex</button>
            <button class="ctrl-btn" id="btn-trace"   onclick="toggleTrace()">⊘ Trace</button>
            <button class="ctrl-btn" id="btn-clear"   onclick="clearCanvas()">↺ Clear</button>
        </div>
        <div class="ui-bottom-right">
            <div><a href="claude_index.html" style="color:#b0a890;text-decoration:none;letter-spacing:2px;font-size:9px;">← Index</a></div>
            <div style="margin-top:8px;">Move mouse to warp the field</div>
            <div>Click to pulse</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H, t = 0;
let mx = -9999, my = -9999;
let tmx = -9999, tmy = -9999;

let mode = 'attract';
let traceOn = true;

// Particle pool
const N = 1800;
const particles = [];

class Particle {
    constructor() { this.reset(true); }
    reset(random) {
        this.x  = random ? Math.random() * W : W / 2 + (Math.random()-0.5)*40;
        this.y  = random ? Math.random() * H : H / 2 + (Math.random()-0.5)*40;
        this.vx = (Math.random()-0.5) * 0.4;
        this.vy = (Math.random()-0.5) * 0.4;
        this.life = Math.random() * 0.6 + 0.3;   // opacity scale
        this.speed = Math.random() * 0.8 + 0.3;
        this.size  = Math.random() * 1.2 + 0.4;
        // base flow angle — Perlin-like using sin/cos
        this.phase = Math.random() * Math.PI * 2;
    }

    update() {
        const mouseActive = mx > -9000;

        // Base curl-noise flow field
        const fx = Math.sin(this.y * 0.006 + t * 0.004 + this.phase) * 0.18;
        const fy = Math.cos(this.x * 0.006 + t * 0.003 + this.phase) * 0.18;
        this.vx += fx * this.speed;
        this.vy += fy * this.speed;

        // Mouse influence
        if (mouseActive) {
            const dx = this.x - mx, dy = this.y - my;
            const dist2 = dx*dx + dy*dy;
            const dist  = Math.sqrt(dist2) + 1;
            const reach = 220;

            if (dist < reach) {
                const strength = ((reach - dist) / reach) ** 1.6 * 3.2 * this.speed;

                if (mode === 'attract') {
                    this.vx -= (dx / dist) * strength;
                    this.vy -= (dy / dist) * strength;
                } else if (mode === 'repel') {
                    this.vx += (dx / dist) * strength;
                    this.vy += (dy / dist) * strength;
                } else if (mode === 'vortex') {
                    // tangential (perpendicular) force
                    this.vx -= (dy / dist) * strength * 0.9;
                    this.vy += (dx / dist) * strength * 0.9;
                }
            }
        }

        // Damping
        this.vx *= 0.93;
        this.vy *= 0.93;

        this.x += this.vx;
        this.y += this.vy;

        // Wrap
        if (this.x < -10) this.x = W + 10;
        if (this.x > W+10) this.x = -10;
        if (this.y < -10) this.y = H + 10;
        if (this.y > H+10) this.y = -10;
    }

    draw() {
        const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        const alpha = Math.min(speed * 1.8 + 0.08, 0.65) * this.life;

        // colour shifts subtly with velocity direction
        let r = 42, g = 37, b = 32;
        if (mode === 'repel')  { r = 160; g = 55; b = 40; }
        if (mode === 'vortex') { r = 38;  g = 72; b = 130; }

        if (traceOn && speed > 0.3) {
            // draw a short oriented line (trail)
            const len = Math.min(speed * 8, 22);
            const nx = this.vx / (speed + 0.001), ny = this.vy / (speed + 0.001);
            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.7})`;
            ctx.lineWidth = this.size * 0.6;
            ctx.beginPath();
            ctx.moveTo(this.x - nx * len * 0.5, this.y - ny * len * 0.5);
            ctx.lineTo(this.x + nx * len * 0.5, this.y + ny * len * 0.5);
            ctx.stroke();
        } else {
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

function init() {
    particles.length = 0;
    for (let i = 0; i < N; i++) particles.push(new Particle());
}

// Pulse on click
window.addEventListener('click', () => {
    if (mx < -9000) return;
    // create burst of new particles from mouse
    for (let i = 0; i < 80; i++) {
        const p = new Particle();
        p.reset(false);
        const a = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        p.vx = Math.cos(a) * spd;
        p.vy = Math.sin(a) * spd;
        particles.push(p);
    }
    // keep pool bounded
    while (particles.length > N + 300) particles.shift();
});

// Trail fade overlay — drawn each frame
let traceFade = true;

function animate() {
    if (traceOn && traceFade) {
        ctx.fillStyle = 'rgba(240,237,232,0.18)';
        ctx.fillRect(0, 0, W, H);
    } else {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#f0ede8';
        ctx.fillRect(0, 0, W, H);
    }

    particles.forEach(p => { p.update(); p.draw(); });

    // Stats
    const avgSpd = particles.reduce((s,p) => s + Math.sqrt(p.vx*p.vx+p.vy*p.vy), 0) / particles.length;
    document.getElementById('stat-count').textContent = particles.length;
    document.getElementById('stat-speed').textContent = avgSpd.toFixed(2);

    // Smooth cursor follow
    mx += (tmx - mx) * 0.10;
    my += (tmy - my) * 0.10;

    t++;
    requestAnimationFrame(animate);
}

// Controls
function setMode(m) {
    mode = m;
    ['attract','repel','vortex'].forEach(id => {
        document.getElementById('btn-'+id).classList.toggle('active', id === m);
    });
    document.getElementById('stat-mode').textContent = m.toUpperCase();
    cursorEl.className = m;
}

function toggleTrace() {
    traceOn = !traceOn;
    traceFade = traceOn;
    document.getElementById('btn-trace').classList.toggle('active', traceOn);
    document.getElementById('stat-trace').textContent = traceOn ? 'ON' : 'OFF';
    if (!traceOn) clearCanvas();
}

function clearCanvas() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f0ede8';
    ctx.fillRect(0, 0, W, H);
}

// Mouse
window.addEventListener('mousemove', e => {
    tmx = e.clientX; tmy = e.clientY;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
});

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); clearCanvas(); });
resize();
init();
setMode('attract');
animate();
</script>

  <script src="../../assets/gallery-nav.js"></script>
</body>
</html>
