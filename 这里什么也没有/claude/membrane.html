<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENSION MEMBRANE // CLAUDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #f0ede8;
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        canvas { position: absolute; inset: 0; z-index: 1; }

        .ui {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 48px 56px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ui-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .title-block h1 {
            font-family: 'EB Garamond', serif;
            font-size: 13px; font-weight: 400;
            letter-spacing: 1px; color: #2a2520;
        }
        .title-block .sub {
            font-size: 9px; letter-spacing: 3px;
            color: #a09880; margin-top: 4px; text-transform: uppercase;
        }

        .ui-top-right {
            text-align: right; font-size: 9px;
            letter-spacing: 2px; color: #b0a890; line-height: 2.4;
        }
        .ui-top-right span { color: #2a2520; }

        .ui-bottom { display: flex; justify-content: space-between; align-items: flex-end; }

        .controls { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }

        .ctrl-btn {
            font-family: 'DM Mono', monospace;
            font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
            color: #a09880; background: none;
            border: 1px solid rgba(42,37,32,0.15);
            padding: 7px 14px; cursor: pointer; transition: all 0.2s;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            color: #2a2520; border-color: rgba(42,37,32,0.5);
            background: rgba(42,37,32,0.04);
        }

        .ui-bottom-right {
            text-align: right; font-size: 9px;
            letter-spacing: 1px; color: #b0a890; line-height: 2.2;
        }

        #cursor {
            width: 6px; height: 6px;
            border: 1px solid #2a2520; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: multiply;
            transition: width 0.15s, height 0.15s, border-color 0.15s;
        }
        #cursor.drag {
            width: 22px; height: 22px;
            background: rgba(42,37,32,0.05);
            border-color: rgba(42,37,32,0.6);
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>

<div class="ui">
    <div class="ui-top">
        <div class="title-block">
            <h1>Tension Membrane</h1>
            <div class="sub">Claude · 02 · Physics</div>
        </div>
        <div class="ui-top-right">
            <div>TENSION  <span id="s-tension">0.28</span></div>
            <div>DAMPING  <span id="s-damp">0.985</span></div>
            <div>ENERGY   <span id="s-energy">—</span></div>
            <div>MODE     <span id="s-mode">PULL</span></div>
        </div>
    </div>
    <div class="ui-bottom">
        <div class="controls">
            <button class="ctrl-btn active" id="btn-pull"  onclick="setMode('pull')">⊙ Pull</button>
            <button class="ctrl-btn"        id="btn-push"  onclick="setMode('push')">⊕ Push</button>
            <button class="ctrl-btn"        id="btn-slash" onclick="setMode('slash')">⊘ Slash</button>
            <button class="ctrl-btn"        id="btn-reset" onclick="resetGrid()">↺ Reset</button>
        </div>
        <div class="ui-bottom-right">
            <div><a href="claude_index.html" style="color:#b0a890;text-decoration:none;letter-spacing:2px;font-size:9px;">← Index</a></div>
            <div style="margin-top:8px;">Click + drag to deform</div>
            <div>Watch the waves interfere</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H;
// Grid resolution — more cols/rows = finer mesh
let COLS, ROWS;
const SPACING = 38; // px between nodes

let nodes = [];   // flat array [row][col]
let mode = 'pull';
let mouseDown = false;
let mx = -9999, my = -9999;

// Physics constants
const TENSION  = 0.28;
const DAMPING  = 0.985;
const MASS     = 1.0;

// Each node: { x, y, vx, vy, ox, oy, pinned }
function idx(r, c) { return r * COLS + c; }

function resetGrid() {
    nodes = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const ox = c * SPACING + (W - (COLS - 1) * SPACING) / 2;
            const oy = r * SPACING + (H - (ROWS - 1) * SPACING) / 2;
            nodes.push({
                x: ox, y: oy,
                vx: 0, vy: 0,
                ox, oy,
                // pin all 4 corners and edge nodes
                pinned: (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1)
            });
        }
    }
}

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    COLS = Math.floor((W - 80) / SPACING) + 1;
    ROWS = Math.floor((H - 80) / SPACING) + 1;
    resetGrid();
}

// Spring force between two nodes
function applySpring(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
    // rest length = current spacing (diagonal or axis)
    const restX = b.ox - a.ox, restY = b.oy - a.oy;
    const rest = Math.sqrt(restX*restX + restY*restY);
    const stretch = dist - rest;
    const force = TENSION * stretch / MASS;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    if (!a.pinned) { a.vx += fx; a.vy += fy; }
    if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
}

function update() {
    // Springs: horizontal, vertical, diagonal
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const n = nodes[idx(r, c)];
            if (c < COLS-1) applySpring(n, nodes[idx(r, c+1)]);
            if (r < ROWS-1) applySpring(n, nodes[idx(r+1, c)]);
            if (r < ROWS-1 && c < COLS-1) applySpring(n, nodes[idx(r+1, c+1)]);
            if (r < ROWS-1 && c > 0)      applySpring(n, nodes[idx(r+1, c-1)]);
        }
    }

    // Mouse force
    if (mouseDown && mx > -9000) {
        const radius = 90;
        nodes.forEach(n => {
            if (n.pinned) return;
            const dx = n.x - mx, dy = n.y - my;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < radius) {
                const strength = ((radius - dist) / radius) ** 1.4 * 14;
                if (mode === 'pull') {
                    n.vx -= (dx / (dist+1)) * strength;
                    n.vy -= (dy / (dist+1)) * strength;
                } else if (mode === 'push') {
                    n.vx += (dx / (dist+1)) * strength;
                    n.vy += (dy / (dist+1)) * strength;
                }
            }
        });
    }

    // Integrate + dampen
    const MAX_DISP = SPACING * 3.5;
    const MAX_VEL  = 18;
    let totalEnergy = 0;
    nodes.forEach(n => {
        if (n.pinned) return;
        n.vx *= DAMPING;
        n.vy *= DAMPING;
        const spd = Math.sqrt(n.vx*n.vx + n.vy*n.vy);
        if (spd > MAX_VEL) { n.vx = n.vx/spd*MAX_VEL; n.vy = n.vy/spd*MAX_VEL; }
        n.x += n.vx;
        n.y += n.vy;
        const ddx = n.x - n.ox, ddy = n.y - n.oy;
        const dd  = Math.sqrt(ddx*ddx + ddy*ddy);
        if (dd > MAX_DISP) {
            const scale = MAX_DISP / dd;
            n.x = n.ox + ddx * scale;
            n.y = n.oy + ddy * scale;
            n.vx *= 0.3; n.vy *= 0.3;
        }
        totalEnergy += n.vx*n.vx + n.vy*n.vy;
    });

    document.getElementById('s-energy').textContent = (totalEnergy / nodes.length * 100).toFixed(1);
}

// Colour a node by displacement magnitude
function dispColor(n) {
    const dx = n.x - n.ox, dy = n.y - n.oy;
    const disp = Math.sqrt(dx*dx + dy*dy);
    // map 0→subtle, high→warm tint
    const t = Math.min(disp / 55, 1);
    // ink base → warm accent
    const r = Math.round(42  + t * 130);
    const g = Math.round(37  - t * 10);
    const b = Math.round(32  - t * 15);
    return { r, g, b, t };
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f0ede8';
    ctx.fillRect(0, 0, W, H);

    // Draw springs (quads as lines)
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const n = nodes[idx(r, c)];
            const col = dispColor(n);

            // horizontal
            if (c < COLS-1) {
                const nb = nodes[idx(r, c+1)];
                const colB = dispColor(nb);
                const t = (col.t + colB.t) / 2;
                const alpha = 0.12 + t * 0.55;
                ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
                ctx.lineWidth = 0.5 + t * 0.8;
                ctx.beginPath();
                ctx.moveTo(n.x, n.y);
                ctx.lineTo(nb.x, nb.y);
                ctx.stroke();
            }
            // vertical
            if (r < ROWS-1) {
                const nb = nodes[idx(r+1, c)];
                const colB = dispColor(nb);
                const t = (col.t + colB.t) / 2;
                const alpha = 0.12 + t * 0.55;
                ctx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
                ctx.lineWidth = 0.5 + t * 0.8;
                ctx.beginPath();
                ctx.moveTo(n.x, n.y);
                ctx.lineTo(nb.x, nb.y);
                ctx.stroke();
            }
        }
    }

    // Draw nodes — only displaced ones pop
    nodes.forEach(n => {
        const col = dispColor(n);
        if (col.t < 0.04) return;
        const radius = 1.2 + col.t * 2.5;
        ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},${0.3 + col.t * 0.7})`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, radius, 0, Math.PI*2);
        ctx.fill();
    });

    // Slash trail — rendered separately above
}

// Slash mode: drag to cut/wave the membrane
let slashPrev = null;
function applySlash() {
    if (!mouseDown || !slashPrev || mode !== 'slash') return;
    const dx = mx - slashPrev.x, dy = my - slashPrev.y;
    const speed = Math.sqrt(dx*dx + dy*dy);
    if (speed < 1) return;

    const cappedSpeed = Math.min(speed, 28); // cap slash impulse
    const radius = 50;
    nodes.forEach(n => {
        if (n.pinned) return;
        const px = n.x - mx, py = n.y - my;
        const dist = Math.sqrt(px*px + py*py);
        if (dist < radius) {
            const str = ((radius - dist)/radius) ** 1.2 * cappedSpeed * 0.12;
            n.vx += dx / (speed + 0.001) * str;
            n.vy += dy / (speed + 0.001) * str;
        }
    });
    slashPrev = { x: mx, y: my };
}

function animate() {
    update();
    applySlash();
    draw();
    requestAnimationFrame(animate);
}

// --- Controls ---
function setMode(m) {
    mode = m;
    ['pull','push','slash'].forEach(id =>
        document.getElementById('btn-'+id).classList.toggle('active', id === m)
    );
    document.getElementById('s-mode').textContent = m.toUpperCase();
}

// --- Mouse ---
window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
    if (mouseDown && mode === 'slash' && !slashPrev) slashPrev = { x: mx, y: my };
    if (mouseDown && mode === 'slash') slashPrev = slashPrev || { x: mx, y: my };
});

window.addEventListener('mousedown', e => {
    mouseDown = true;
    cursorEl.classList.add('drag');
    if (mode === 'slash') slashPrev = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => {
    mouseDown = false;
    slashPrev = null;
    cursorEl.classList.remove('drag');
});

// Single click impulse (non-drag modes)
window.addEventListener('click', e => {
    if (mode === 'slash') return;
    const radius = 70;
    nodes.forEach(n => {
        if (n.pinned) return;
        const dx = n.x - e.clientX, dy = n.y - e.clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < radius) {
            const str = ((radius-dist)/radius) ** 1.2 * 18;
            if (mode === 'pull') {
                n.vx -= (dx/(dist+1))*str;
                n.vy -= (dy/(dist+1))*str;
            } else {
                n.vx += (dx/(dist+1))*str;
                n.vy += (dy/(dist+1))*str;
            }
        }
    });
});

window.addEventListener('resize', resize);
resize();
animate();
</script>
</body>
</html>
