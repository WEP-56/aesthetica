<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>余温</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes steam {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  50% { transform: translateY(-30px) scale(1.3); opacity: 0.3; }
  100% { transform: translateY(-60px) scale(1.8); opacity: 0; }
}

@keyframes flicker {
  0%, 100% { opacity: 0.7; }
  25% { opacity: 0.85; }
  50% { opacity: 0.65; }
  75% { opacity: 0.9; }
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

body {
  background: #0d0d0f;
  color: #c4b8a8;
  font-family: "Noto Serif SC", "Songti SC", serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
  cursor: default;
}

#rain-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.room {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: fadeIn 4s ease-out;
}

/* 窗户 */
.window {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 200px;
  border: 3px solid #2a2520;
  background: linear-gradient(180deg, #0a0a12 0%, #151520 100%);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 3s ease;
}

.window:hover {
  border-color: #3a3530;
}

.window-frame {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.window-frame::before,
.window-frame::after {
  content: '';
  position: absolute;
  background: #2a2520;
}

.window-frame::before {
  width: 3px;
  height: 100%;
  left: 50%;
  transform: translateX(-50%);
}

.window-frame::after {
  width: 100%;
  height: 3px;
  top: 50%;
  transform: translateY(-50%);
}

.window-glass {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(30,30,50,0.3) 0%, rgba(20,20,35,0.5) 100%);
  pointer-events: none;
}

/* 桌子 */
.table {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 12px;
  background: linear-gradient(90deg, #1a1510 0%, #2a2018 30%, #2a2018 70%, #1a1510 100%);
  border-radius: 2px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

.table::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 20px;
  right: 20px;
  height: 80px;
  background: linear-gradient(180deg, #15100a 0%, #0a0805 100%);
  border-radius: 0 0 4px 4px;
}

/* 茶杯 */
.teacup {
  position: absolute;
  bottom: calc(18% + 12px);
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 45px;
  cursor: pointer;
  z-index: 10;
}

.teacup-body {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 40px;
  background: linear-gradient(180deg, #e8ddd0 0%, #c4b8a8 100%);
  border-radius: 0 0 25px 25px;
  box-shadow: 
    inset -3px 0 5px rgba(255,255,255,0.1),
    inset 3px 0 5px rgba(0,0,0,0.1),
    0 2px 8px rgba(0,0,0,0.4);
}

.teacup-body::before {
  content: '';
  position: absolute;
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
  width: 44px;
  height: 8px;
  background: #3a3020;
  border-radius: 50%;
  opacity: 0.8;
}

.teacup-handle {
  position: absolute;
  right: -8px;
  top: 10px;
  width: 16px;
  height: 22px;
  border: 3px solid #c4b8a8;
  border-radius: 0 12px 12px 0;
  border-left: none;
}

/* 蒸汽 */
.steam-container {
  position: absolute;
  bottom: calc(18% + 55px);
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 80px;
  pointer-events: none;
  z-index: 9;
}

.steam {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, rgba(200,190,170,0.4) 0%, transparent 70%);
  border-radius: 50%;
  animation: steam 4s ease-out infinite;
}

.steam:nth-child(1) { left: 40%; animation-delay: 0s; }
.steam:nth-child(2) { left: 50%; animation-delay: 1.2s; }
.steam:nth-child(3) { left: 60%; animation-delay: 2.4s; }

/* 镜子 */
.mirror {
  position: absolute;
  top: 15%;
  right: 12%;
  width: 140px;
  height: 200px;
  border: 4px solid #2a2520;
  border-radius: 4px;
  background: linear-gradient(135deg, #1a1a22 0%, #0f0f15 50%, #1a1a22 100%);
  overflow: hidden;
  cursor: pointer;
  transition: filter 0.5s ease;
}

.mirror:hover {
  filter: brightness(1.1);
}

.mirror-surface {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, 
    rgba(30,30,40,0.6) 0%, 
    rgba(20,20,30,0.8) 40%,
    rgba(15,15,25,0.9) 100%);
}

.mirror-fog {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 30% 40%, rgba(180,170,160,0.15) 0%, transparent 60%);
  pointer-events: none;
  transition: opacity 8s ease;
}

.mirror-reflection {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 60px;
  background: linear-gradient(180deg, rgba(60,55,50,0.3) 0%, rgba(40,35,30,0.1) 100%);
  border-radius: 20px 20px 0 0;
  filter: blur(2px);
  animation: breathe 6s ease-in-out infinite;
}

/* 台灯 */
.lamp {
  position: absolute;
  bottom: calc(18% + 12px);
  right: 30%;
  width: 40px;
  height: 80px;
  cursor: pointer;
}

.lamp-base {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 8px;
  background: #2a2018;
  border-radius: 2px;
}

.lamp-pole {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 50px;
  background: #3a3028;
}

.lamp-shade {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 30px solid #3a3028;
}

.lamp-light {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,220,150,0.08) 0%, transparent 70%);
  pointer-events: none;
  animation: flicker 4s ease-in-out infinite;
  transition: opacity 2s ease;
}

/* 光晕覆盖层 */
.ambient-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 50% 80%, rgba(40,30,20,0.3) 0%, transparent 60%);
  pointer-events: none;
  z-index: 3;
}

/* 文字 */
.whisper {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  letter-spacing: 6px;
  color: rgba(140,130,120,0.4);
  text-align: center;
  line-height: 2;
  animation: fadeIn 8s ease-out;
}

.whisper a {
  color: rgba(140,130,120,0.3);
  text-decoration: none;
  border-bottom: 1px solid rgba(140,130,120,0.15);
  transition: color 2s ease, border-color 2s ease;
  margin: 0 8px;
}

.whisper a:hover {
  color: rgba(180,170,160,0.6);
  border-color: rgba(180,170,160,0.3);
}

/* 时间痕迹 */
.time-trace {
  position: absolute;
  top: 5%;
  left: 5%;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(100,90,80,0.25);
  font-family: monospace;
}

/* 互动提示 */
.hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(140,130,120,0);
  transition: color 3s ease;
  pointer-events: none;
  z-index: 100;
}

body:hover .hint {
  color: rgba(140,130,120,0.15);
}

/* 涟漪效果 */
.ripple {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(200,190,170,0.3);
  pointer-events: none;
  animation: rippleExpand 2s ease-out forwards;
}

@keyframes rippleExpand {
  0% { width: 0; height: 0; opacity: 0.6; }
  100% { width: 100px; height: 100px; opacity: 0; }
}
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<div class="ambient-glow"></div>

<div class="room">
  <div class="time-trace" id="time-trace"></div>

  <!-- 窗户 -->
  <div class="window" id="window" title="点击改变雨势">
    <div class="window-glass"></div>
    <div class="window-frame"></div>
  </div>

  <!-- 镜子 -->
  <div class="mirror" id="mirror" title="点击触碰镜面">
    <div class="mirror-surface"></div>
    <div class="mirror-fog" id="mirror-fog"></div>
    <div class="mirror-reflection"></div>
  </div>

  <!-- 台灯 -->
  <div class="lamp" id="lamp" title="点击调节灯光">
    <div class="lamp-shade"></div>
    <div class="lamp-pole"></div>
    <div class="lamp-base"></div>
    <div class="lamp-light" id="lamp-light"></div>
  </div>

  <!-- 桌子 -->
  <div class="table"></div>

  <!-- 茶杯 -->
  <div class="teacup" id="teacup" title="点击拨动茶水">
    <div class="teacup-body"></div>
    <div class="teacup-handle"></div>
  </div>

  <!-- 蒸汽 -->
  <div class="steam-container" id="steam-container">
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
  </div>

  <!-- 文字 -->
  <div class="whisper">
    雨还在下<br>
    <a href="memory.html">旧物</a>
    <a href="silence.html">寂静</a>
    <a href="trace.html">痕迹</a>
  </div>

  <div class="hint">万物皆有迟缓的回应</div>
</div>

<script>
// ============================
// 雨
// ============================
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let rainIntensity = 1; // 0.3 ~ 2.0
let drops = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Drop {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * -canvas.height;
    this.speed = (Math.random() * 3 + 4) * rainIntensity;
    this.length = (Math.random() * 15 + 10) * rainIntensity;
    this.opacity = Math.random() * 0.15 + 0.05;
    this.width = Math.random() * 0.8 + 0.3;
  }

  update() {
    this.y += this.speed;
    if (this.y > canvas.height) {
      this.reset();
    }
  }

  draw() {
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x, this.y + this.length);
    ctx.strokeStyle = `rgba(140, 150, 170, ${this.opacity})`;
    ctx.lineWidth = this.width;
    ctx.stroke();
  }
}

// 初始化雨滴
for (let i = 0; i < 300; i++) {
  drops.push(new Drop());
}

function animateRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 雨滴
  drops.forEach(drop => {
    drop.update();
    drop.draw();
  });

  // 鼠标轨迹
  ctx.save();
  mouseTrail.forEach((point, i) => {
    point.life -= 0.015;
    if (point.life > 0) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 170, 150, ${point.life * 0.08})`;
      ctx.fill();
    }
  });
  mouseTrail = mouseTrail.filter(p => p.life > 0);
  ctx.restore();

  requestAnimationFrame(animateRain);
}
animateRain();

// 点击窗户改变雨势
document.getElementById('window').addEventListener('click', () => {
  rainIntensity = rainIntensity === 1 ? 0.3 : (rainIntensity === 0.3 ? 2 : 1);
  drops.forEach(drop => {
    drop.speed = (Math.random() * 3 + 4) * rainIntensity;
    drop.length = (Math.random() * 15 + 10) * rainIntensity;
  });
});

// ============================
// 茶杯涟漪
// ============================
const teacup = document.getElementById('teacup');
teacup.addEventListener('click', (e) => {
  const rect = teacup.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (x - 50) + 'px';
  ripple.style.top = (y - 50) + 'px';
  teacup.appendChild(ripple);

  setTimeout(() => ripple.remove(), 2000);

  // 蒸汽变浓
  const steams = document.querySelectorAll('.steam');
  steams.forEach(s => {
    s.style.animationDuration = '2s';
    setTimeout(() => {
      s.style.animationDuration = '4s';
    }, 4000);
  });
});

// ============================
// 镜子雾气
// ============================
const mirror = document.getElementById('mirror');
const mirrorFog = document.getElementById('mirror-fog');
let fogOpacity = 0.15;

mirror.addEventListener('click', () => {
  fogOpacity = fogOpacity > 0.3 ? 0.05 : 0.4;
  mirrorFog.style.opacity = fogOpacity;

  // 雾气散去的延迟
  setTimeout(() => {
    fogOpacity = 0.15;
    mirrorFog.style.opacity = fogOpacity;
  }, 10000);
});

// ============================
// 台灯
// ============================
const lamp = document.getElementById('lamp');
const lampLight = document.getElementById('lamp-light');
let lightOn = true;

lamp.addEventListener('click', () => {
  lightOn = !lightOn;
  lampLight.style.opacity = lightOn ? '1' : '0.1';
});

// ============================
// 时间痕迹
// ============================
const timeTrace = document.getElementById('time-trace');

function updateTimeTrace() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  timeTrace.textContent = `${hours}:${minutes}:${seconds}`;
}
setInterval(updateTimeTrace, 1000);
updateTimeTrace();

// ============================
// 蒸汽随真实时间衰减
// ============================
const steamContainer = document.getElementById('steam-container');

function updateSteam() {
  const hour = new Date().getHours();
  let opacity = 1;

  if (hour >= 0 && hour < 4) opacity = 0.3;
  else if (hour >= 4 && hour < 6) opacity = 0.5;
  else if (hour >= 6 && hour < 8) opacity = 0.8;
  else if (hour >= 8 && hour < 12) opacity = 1;
  else if (hour >= 12 && hour < 18) opacity = 0.9;
  else if (hour >= 18 && hour < 22) opacity = 0.7;
  else opacity = 0.4;

  steamContainer.style.opacity = opacity;
}

updateSteam();
setInterval(updateSteam, 60000);

// ============================
// 鼠标轨迹微弱光点
// ============================
let mouseTrail = [];

document.addEventListener('mousemove', (e) => {
  mouseTrail.push({ x: e.clientX, y: e.clientY, life: 1 });
  if (mouseTrail.length > 20) mouseTrail.shift();
});

function drawMouseTrail() {
  ctx.save();
  mouseTrail.forEach((point, i) => {
    point.life -= 0.02;
    if (point.life > 0) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 170, 150, ${point.life * 0.1})`;
      ctx.fill();
    }
  });
  mouseTrail = mouseTrail.filter(p => p.life > 0);
  ctx.restore();
  requestAnimationFrame(drawMouseTrail);
}

</script>

</body>
</html>
