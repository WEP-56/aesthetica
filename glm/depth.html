<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深处</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #050b16;
    font-family: 'Songti SC', 'SimSun', 'Noto Serif CJK SC', 'Source Han Serif SC', serif;
  }

  /* 背景微粒 */
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* 气泡容器 */
  .ocean {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
  }

  .bubble {
    position: absolute;
    letter-spacing: 3px;
    color: rgba(120, 165, 210, 0.45);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.6s ease, text-shadow 0.6s ease, transform 0.4s ease;
  }
  .bubble.clarified {
    color: rgba(195, 218, 245, 0.92);
    text-shadow: 0 0 18px rgba(140, 185, 230, 0.28);
    transform: scale(1.1);
  }

  /* 底部固定文字 */
  .anchor {
    position: fixed;
    bottom: 44px;
    width: 100%;
    text-align: center;
    z-index: 10;
    opacity: 0;
    transition: opacity 3.5s ease;
    pointer-events: none;
  }
  .anchor.show {
    opacity: 1;
    pointer-events: auto;
  }
  .anchor a {
    font-size: 14px;
    letter-spacing: 6px;
    color: rgba(150, 180, 215, 0.48);
    text-decoration: none;
    transition: color 2s ease;
  }
  .anchor a:hover {
    color: rgba(180, 205, 235, 0.72);
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="ocean" id="ocean"></div>
<div class="anchor" id="anchor">
  <a href="surface.html">有些东西不会消散</a>
</div>

<script>
/* ==== 背景微粒 ==== */
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
let BW, BH;

function resizeBg() {
  BW = bgCanvas.width = window.innerWidth;
  BH = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

/* 生成微粒 */
const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * BW,
    y: Math.random() * BH,
    r: 0.6 + Math.random() * 1.2,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 3 - 1,
    phase: Math.random() * Math.PI * 2,
    baseAlpha: 0.04 + Math.random() * 0.08,
  });
}

function drawBg(now) {
  const t = now / 1000;
  bgCtx.clearRect(0, 0, BW, BH);
  for (const p of particles) {
    p.x += p.dx * 0.016;
    p.y += p.dy * 0.016;
    /* 边界回绕 */
    if (p.x < -10) p.x = BW + 10;
    if (p.x > BW + 10) p.x = -10;
    if (p.y < -10) p.y = BH + 10;
    if (p.y > BH + 10) p.y = -10;

    const flicker = Math.sin(t * 0.8 + p.phase) * 0.5 + 0.5;
    const alpha = p.baseAlpha * (0.5 + flicker * 0.5);
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, Math.max(0.3, p.r), 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(100,160,220,${alpha})`;
    bgCtx.fill();
  }
  requestAnimationFrame(drawBg);
}
requestAnimationFrame(drawBg);

/* ==== 气泡文字 ==== */
const ocean = document.getElementById('ocean');
const anchor = document.getElementById('anchor');

const phrases = [
  '某种气味', '楼梯间的脚步声', '一个名字的第一个字',
  '手指触碰桌面的温度', '远处的钟声', '一本没读完的书',
  '那种笑', '雨停之后', '一句歌词', '背影',
  '风吹过走廊', '沉默', '一段旋律',
  '睁开眼之前的画面', '一句没说出口的话', '你的声音',
  '下过雨的操场', '某种光', '回头看的瞬间', '一道影子',
];

const bubbles = [];
let bubbleTime = 0;
let nextSpawn = 1.5;
let lastFrame = performance.now();

function spawnBubble() {
  const phrase = phrases[Math.floor(Math.random() * phrases.length)];
  const x = 8 + Math.random() * 84;
  const size = 12 + Math.random() * 5;
  const speed = 14 + Math.random() * 18;

  const el = document.createElement('span');
  el.className = 'bubble';
  el.textContent = phrase;
  el.style.left = x + '%';
  el.style.bottom = '-40px';
  el.style.fontSize = size + 'px';
  /* 较小的字更淡，模拟距离 */
  const distAlpha = 0.25 + ((size - 12) / 5) * 0.25;
  el.style.color = `rgba(120,165,210,${distAlpha})`;
  ocean.appendChild(el);

  const b = { el, y: -40, speed, clarified: false, timer: null, distAlpha };
  el.addEventListener('click', () => {
    if (b.clarified) return;
    b.clarified = true;
    el.classList.add('clarified');
    clearTimeout(b.timer);
    b.timer = setTimeout(() => {
      b.clarified = false;
      el.classList.remove('clarified');
    }, 2800);
  });
  bubbles.push(b);
}

function updateBubbles(now) {
  let dt = Math.min(0.1, (now - lastFrame) / 1000);
  lastFrame = now;
  bubbleTime += dt;

  /* 生成 */
  if (bubbleTime > nextSpawn) {
    spawnBubble();
    nextSpawn = bubbleTime + 1.8 + Math.random() * 2.2;
  }

  /* 更新位置与透明度 */
  const H = window.innerHeight;
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y += b.speed * dt;
    b.el.style.bottom = b.y + 'px';

    /* 渐入 + 渐出 */
    const fadeZone = H * 0.08;
    const vanishZone = H * 0.62;
    let alpha = b.distAlpha;
    if (b.y < fadeZone) {
      alpha *= b.y / fadeZone;
    }
    if (b.y > vanishZone) {
      alpha *= 1 - (b.y - vanishZone) / (H * 0.3);
    }
    alpha = Math.max(0, alpha);

    if (b.clarified) {
      b.el.style.opacity = Math.min(1, alpha + 0.5);
    } else {
      b.el.style.opacity = alpha;
    }

    /* 移除 */
    if (alpha <= 0.005 || b.y > H + 50) {
      b.el.remove();
      bubbles.splice(i, 1);
    }
  }

  /* 底部文字 15 秒后出现 */
  if (bubbleTime > 15) anchor.classList.add('show');

  requestAnimationFrame(updateBubbles);
}
requestAnimationFrame(updateBubbles);
</script>

  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
