<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房间 · 304</title>
  <style>
    :root {
      --bg: #1e1a16;
      --paper: #ede1c8;
      --paper-dark: #d9caa6;
      --ink: #2f2a24;
      --brass: #9b7d5c;
      --wood: #3a2f26;
      --shadow: rgba(0,0,0,0.6);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background-color: var(--bg);
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Noto Serif SC", "Songti SC", serif;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    .room {
      position: relative;
      width: min(600px, 90vw);
      height: min(500px, 80vh);
      background: radial-gradient(ellipse at 50% 30%, #29231d 0%, #16120f 90%);
      border: 1px solid #2a2420;
      box-shadow: 0 0 100px rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 3rem;
    }

    /* 桌子 */
    .desk {
      position: relative;
      width: 80%;
      height: 45%;
      background: linear-gradient(180deg, #4a3d33 0%, #3a2f26 20%, #2b231c 100%);
      border-radius: 2px;
      box-shadow: 
        inset 0 2px 10px rgba(0,0,0,0.5),
        0 15px 30px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 桌上的物品区 */
    .items {
      display: flex;
      gap: 3rem;
      align-items: flex-end;
      padding-bottom: 1rem;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease, filter 0.3s ease;
      cursor: pointer;
    }

    .item:hover {
      transform: translateY(-6px);
      filter: drop-shadow(0 4px 12px rgba(232, 213, 163, 0.5));
    }

    /* 相框 */
    .frame {
      width: 45px;
      height: 55px;
      background: #6b5a4a;
      border: 3px solid #4d3e32;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #2f2a24;
      opacity: 0.7;
      background-image: radial-gradient(circle at 20% 25%, #ccc 1px, transparent 1px),
                        radial-gradient(circle at 70% 60%, #999 1px, transparent 1px);
    }

    /* 茶杯 */
    .cup {
      width: 32px;
      height: 28px;
      background: #c4b5a3;
      border-radius: 0 0 12px 12px;
      border: 2px solid #8b7a68;
      border-top: 1px solid #a2927f;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }
    .cup::after {
      content: "";
      position: absolute;
      top: -4px;
      left: 4px;
      width: 22px;
      height: 4px;
      background: #8b7a68;
      border-radius: 4px;
    }

    /* 便笺 - 可点击进入 page2 */
    .note {
      width: 48px;
      height: 36px;
      background: var(--paper);
      border-radius: 2px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 0 4px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #3a2a1c;
      transform: rotate(-1deg);
      background-image: repeating-linear-gradient(transparent, transparent 7px, #d9caa6 7px, #d9caa6 8px);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .note:hover {
      transform: rotate(0deg) translateY(-8px);
      box-shadow: 0 12px 18px rgba(0,0,0,0.6), 0 0 20px rgba(232,213,163,0.7);
    }
    .note-text {
      font-family: "PingFang SC", "Noto Serif SC", serif;
      font-size: 8px;
      color: #2f2a24;
      line-height: 1.3;
      text-align: center;
      padding: 4px;
    }

    /* 返回门 */
    .back-door {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 24px;
      color: #5a4a3a;
      text-decoration: none;
      transition: color 0.3s;
      opacity: 0.5;
    }
    .back-door:hover {
      color: #b8936e;
      opacity: 1;
    }

    .subtle-hint {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #5a4a3a;
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.5;
      animation: fadeHint 5s ease-in-out infinite;
    }
    @keyframes fadeHint {
      0%,100%{ opacity:0.4; }
      50%{ opacity:0.8; }
    }

    @media (max-width: 500px) {
      .items { gap: 2rem; }
    }
  </style>
</head>
<body>
<div class="room">
  <a href="index.html" class="back-door" title="离开房间">←</a>

  <div class="desk">
    <div class="items">
      <!-- 相框（不可点击） -->
      <div class="item">
        <div class="frame">🖼️</div>
        <span style="font-size:8px;color:#6b5a4a;margin-top:4px;">旧照</span>
      </div>

      <!-- 冷茶（不可点击） -->
      <div class="item">
        <div class="cup"></div>
        <span style="font-size:8px;color:#6b5a4a;margin-top:4px;">冷茶</span>
      </div>

      <!-- 便笺：通往 page2 -->
      <a href="page2.html" class="item" style="text-decoration:none; color:inherit;">
        <div class="note">
          <div class="note-text">没有收件人<br>未寄出</div>
        </div>
        <span style="font-size:8px;color:#6b5a4a;margin-top:4px;">便条</span>
      </a>
    </div>
  </div>

  <div class="subtle-hint">触碰便条</div>
</div>
</body>
</html>
