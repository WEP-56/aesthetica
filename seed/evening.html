<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傍晚 | 时间尘埃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", serif;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(to bottom, #ff7e5f 0%, #feb47b 50%, #2c3e50 100%);
            cursor: default;
            transition: background 60s ease;
        }

        #sun {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd89b 0%, #f7971e 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #f7971e;
            animation: sunset 180s linear infinite;
        }

        @keyframes sunset {
            0% { bottom: 20%; opacity: 1; }
            100% { bottom: -10%; opacity: 0; }
        }

        .silhouette {
            position: fixed;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .evening-memory {
            position: absolute;
            font-size: 12px;
            color: #ffd89b;
            opacity: 0;
            transition: opacity 6s ease;
            max-width: 160px;
            line-height: 1.7;
        }

        .evening-memory.visible {
            opacity: 0.4;
        }

        #back {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 11px;
            color: #ffd89b;
            opacity: 0.3;
            cursor: pointer;
            transition: opacity 1s ease;
            z-index: 100;
        }

        #back:hover {
            opacity: 0.7;
        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 120s ease;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="sun"></div>
    <div id="stars"></div>
    
    <!-- 城市剪影 -->
    <div class="silhouette" style="left: 10%; width: 50px; height: 150px;"></div>
    <div class="silhouette" style="left: 20%; width: 80px; height: 200px;"></div>
    <div class="silhouette" style="left: 35%; width: 40px; height: 120px;"></div>
    <div class="silhouette" style="left: 50%; width: 100px; height: 250px;"></div>
    <div class="silhouette" style="left: 65%; width: 60px; height: 180px;"></div>
    <div class="silhouette" style="left: 80%; width: 70px; height: 220px;"></div>
    <div class="silhouette" style="left: 0; width: 100%; height: 50px;"></div>
    
    <div id="back" onclick="location.href='index.html'">← 返回客厅</div>

    <script>
        const eveningMemories = [
            "夕阳无限好，只是近黄昏",
            "一天结束了，有些故事也该结束了",
            "你站在路口，看着那个人的背影消失在暮色里",
            "路灯一盏盏亮起来，像星星落在了人间",
            "回家的路上，影子被拉得很长很长",
            "天边的晚霞，是天空写给大地的情书",
            "有些再见，说了就是一辈子",
            "傍晚的风，带着一丝凉意，也带着一丝惆怅",
            "你看着夕阳落下，心里想着某个人",
            "明天太阳还会升起，但有些时刻不会再来了"
        ];

        // 创建星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
            
            // 天黑后显示星星
            setTimeout(() => {
                starsContainer.style.opacity = '1';
            }, 60000);
        }

        // 显示傍晚记忆
        function showEveningMemories() {
            let memoryIndex = 0;
            
            setInterval(() => {
                const memory = document.createElement('div');
                memory.className = 'evening-memory';
                memory.textContent = eveningMemories[memoryIndex];
                memory.style.left = (10 + Math.random() * 80) + '%';
                memory.style.top = (10 + Math.random() * 70) + '%';
                
                document.body.appendChild(memory);
                
                setTimeout(() => {
                    memory.classList.add('visible');
                }, 100);
                
                setTimeout(() => {
                    memory.style.opacity = '0';
                    setTimeout(() => {
                        document.body.removeChild(memory);
                    }, 6000);
                }, 18000);
                
                memoryIndex = (memoryIndex + 1) % eveningMemories.length;
            }, 12000);
        }

        // 天空逐渐变暗
        function darkenSky() {
            const darkGradients = [
                'linear-gradient(to bottom, #ff7e5f 0%, #feb47b 50%, #2c3e50 100%)',
                'linear-gradient(to bottom, #e74c3c 0%, #c0392b 30%, #2c3e50 100%)',
                'linear-gradient(to bottom, #8e44ad 0%, #2c3e50 50%, #1a1a2e 100%)',
                'linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f0f23 100%)'
            ];
            
            let gradientIndex = 0;
            
            setInterval(() => {
                gradientIndex = (gradientIndex + 1) % darkGradients.length;
                document.body.style.background = darkGradients[gradientIndex];
            }, 45000);
        }

        function init() {
            createStars();
            showEveningMemories();
            darkenSky();
        }

        init();
    </script>
</body>
</html>
