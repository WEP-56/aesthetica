<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT // CLAUDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #f0ede8;
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        canvas { position: absolute; inset: 0; z-index: 1; }

        .ui {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none;
            padding: 48px 56px;
            display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .ui-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .title-block h1 {
            font-family: 'EB Garamond', serif;
            font-size: 13px; font-weight: 400;
            letter-spacing: 1px; color: #2a2520;
        }
        .title-block .sub {
            font-size: 9px; letter-spacing: 3px;
            color: #a09880; margin-top: 4px; text-transform: uppercase;
        }

        .ui-top-right {
            text-align: right; font-size: 9px;
            letter-spacing: 2px; color: #b0a890; line-height: 2.4;
        }
        .ui-top-right span { color: #2a2520; }

        .ui-bottom { display: flex; justify-content: space-between; align-items: flex-end; }

        .controls { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }

        .ctrl-btn {
            font-family: 'DM Mono', monospace;
            font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
            color: #a09880; background: none;
            border: 1px solid rgba(42,37,32,0.15);
            padding: 7px 14px; cursor: pointer; transition: all 0.2s;
            text-align: left;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            color: #2a2520; border-color: rgba(42,37,32,0.5);
            background: rgba(42,37,32,0.04);
        }

        .ui-bottom-right {
            text-align: right; font-size: 9px;
            letter-spacing: 1px; color: #b0a890; line-height: 2.2;
        }

        /* input overlay */
        #text-input-wrap {
            position: absolute;
            bottom: 110px; left: 56px;
            z-index: 20; pointer-events: auto;
            display: flex; align-items: center; gap: 0;
        }
        #text-input-wrap label {
            font-size: 9px; letter-spacing: 2px; color: #a09880;
            text-transform: uppercase; margin-right: 12px;
        }
        #text-input {
            font-family: 'DM Mono', monospace;
            font-size: 11px; letter-spacing: 2px;
            color: #2a2520; background: transparent;
            border: none; border-bottom: 1px solid rgba(42,37,32,0.25);
            outline: none; padding: 4px 0; width: 280px;
            caret-color: #2a2520;
        }
        #text-input::placeholder { color: #c0b8a8; }

        #cursor {
            width: 5px; height: 5px;
            border: 1px solid #2a2520; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%,-50%);
            mix-blend-mode: multiply;
            transition: width .15s, height .15s;
        }
        #cursor.active { width: 16px; height: 16px; background: rgba(42,37,32,.06); }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="c"></canvas>

<div class="ui">
    <div class="ui-top">
        <div class="title-block">
            <h1>Drift</h1>
            <div class="sub">Claude · 03 · Language</div>
        </div>
        <div class="ui-top-right">
            <div>GLYPHS   <span id="s-glyphs">—</span></div>
            <div>STATE    <span id="s-state">COMPOSED</span></div>
            <div>ENTROPY  <span id="s-entropy">0.00</span></div>
            <div>PHRASE   <span id="s-phrase">—</span></div>
        </div>
    </div>
    <div class="ui-bottom">
        <div class="controls">
            <button class="ctrl-btn active" id="btn-compose"   onclick="setState('compose')">⊙ Compose</button>
            <button class="ctrl-btn"        id="btn-drift"     onclick="setState('drift')">⊘ Drift</button>
            <button class="ctrl-btn"        id="btn-explode"   onclick="setState('explode')">⊛ Explode</button>
            <button class="ctrl-btn"        id="btn-gravity"   onclick="setState('gravity')">⊕ Gravity</button>
            <button class="ctrl-btn"        id="btn-next"      onclick="nextPhrase()">→ Next phrase</button>
        </div>
        <div class="ui-bottom-right">
            <div><a href="claude_index.html" style="color:#b0a890;text-decoration:none;letter-spacing:2px;font-size:9px;">← Index</a></div>
            <div style="margin-top:8px;">Move mouse to pull letters</div>
            <div>Type below to set your own text</div>
        </div>
    </div>
</div>

<div id="text-input-wrap">
    <label>Text ›</label>
    <input id="text-input" type="text" placeholder="type something…" maxlength="60" autocomplete="off" spellcheck="false">
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H, t = 0;
let mx = -9999, my = -9999;

// --- Phrases & emotional weights ---
const PHRASES = [
    "the universe tends toward disorder",
    "light remembers where it has been",
    "language is the house of being",
    "silence between words is also speech",
    "every surface hides a depth",
    "matter is mostly empty space",
    "we are made of collapsed stars",
    "time only moves in one direction",
];

// Emotional weight per letter type — affects drift speed & size
function letterWeight(ch) {
    const heavy   = 'mwqzxgdbp'; // heaviest — slow, large
    const light   = 'iltf.,:; '; // lightest — fast, small
    if (heavy.includes(ch)) return 1.0;
    if (light.includes(ch)) return 0.3;
    return 0.55 + Math.random() * 0.25;
}

// --- Glyph class ---
class Glyph {
    constructor(ch, tx, ty, idx, total) {
        this.ch = ch;
        this.targetX = tx;
        this.targetY = ty;
        this.idx = idx;
        this.total = total;

        // start scattered
        this.x  = Math.random() * W;
        this.y  = Math.random() * H;
        this.vx = 0; this.vy = 0;

        this.weight   = letterWeight(ch.toLowerCase());
        this.size     = 14 + this.weight * 38;   // 14px–52px
        this.italic   = Math.random() < 0.3;
        this.opacity  = 0;
        this.targetOp = 0.85 - this.weight * 0.1;

        // drift params — each letter has a unique slow orbit
        this.driftAmp   = 18 + this.weight * 60;
        this.driftFreq  = 0.003 + Math.random() * 0.006;
        this.driftPhase = Math.random() * Math.PI * 2;
        this.driftAngle = Math.random() * Math.PI * 2;

        // explode vector
        const angle = Math.random() * Math.PI * 2;
        const dist  = 180 + Math.random() * 260;
        this.explodeX = tx + Math.cos(angle) * dist;
        this.explodeY = ty + Math.sin(angle) * dist;

        // gravity fall
        this.fallVy = 0;
        this.gravX  = tx;
        this.gravY  = H + 60 + Math.random() * 200;
    }

    // Recalculate target position (called on resize/rephrasing)
    setTarget(tx, ty) {
        this.targetX = tx;
        this.targetY = ty;
        this.explodeX = tx + (Math.random()-0.5) * 600;
        this.explodeY = ty + (Math.random()-0.5) * 400;
        this.gravX    = tx;
    }

    update(state, t) {
        let gx = this.targetX, gy = this.targetY; // goal position

        if (state === 'drift') {
            gx = this.targetX + Math.cos(this.driftAngle + t * this.driftFreq + this.driftPhase) * this.driftAmp;
            gy = this.targetY + Math.sin(this.driftAngle * 0.7 + t * this.driftFreq * 0.8 + this.driftPhase) * this.driftAmp * 0.6;
        } else if (state === 'explode') {
            gx = this.explodeX;
            gy = this.explodeY;
        } else if (state === 'gravity') {
            // fall toward bottom, pile up just inside screen
            const floor = H - 60 - (this.size * 0.5);
            gx = this.targetX + Math.sin(this.driftPhase + t * 0.001) * 12;
            gy = floor;
        }

        // Mouse repulsion
        if (mx > -9000) {
            const dx = this.x - mx, dy = this.y - my;
            const dist = Math.sqrt(dx*dx + dy*dy) + 1;
            const reach = 130 + this.weight * 60;
            if (dist < reach) {
                const str = ((reach - dist) / reach) ** 1.8 * (6 + this.weight * 8);
                gx += (dx / dist) * str;
                gy += (dy / dist) * str;
            }
        }

        // Spring toward goal
        const stiffness = state === 'compose' ? 0.06 : 0.04 - this.weight * 0.015;
        this.vx += (gx - this.x) * stiffness;
        this.vy += (gy - this.y) * stiffness;

        // Damping — heavier letters damp more (feel sluggish)
        const damp = 0.82 + this.weight * 0.1;
        this.vx *= damp; this.vy *= damp;

        this.x += this.vx; this.y += this.vy;

        // Opacity fade in with slight delay per index
        const targetOp = this.targetOp;
        this.opacity += (targetOp - this.opacity) * 0.04;
    }

    draw() {
        if (this.opacity < 0.01) return;
        const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);

        // Rotation tracks velocity direction when moving fast
        let angle = 0;
        if (speed > 0.8) angle = Math.atan2(this.vy, this.vx) * 0.12;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);

        const style = this.italic ? 'italic ' : '';
        ctx.font = `${style}${Math.round(this.size)}px "EB Garamond", Georgia, serif`;
        ctx.textAlign  = 'center';
        ctx.textBaseline = 'middle';

        // colour: slow/heavy = darker ink; fast/light = warmer
        const heatT = Math.min(speed / 5, 1);
        const r = Math.round(42  + heatT * 100);
        const g = Math.round(37  - heatT * 15);
        const b = Math.round(32  - heatT * 18);
        ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
        ctx.fillText(this.ch, 0, 0);

        ctx.restore();
    }
}

// --- State ---
let glyphs   = [];
let state    = 'compose';
let phraseIdx = 0;

function setState(s) {
    state = s;
    ['compose','drift','explode','gravity'].forEach(id =>
        document.getElementById('btn-'+id).classList.toggle('active', id === s)
    );
    document.getElementById('s-state').textContent = s.toUpperCase();
    if (s === 'gravity') glyphs.forEach(g => { g.fallVy = 0; });
}

function buildGlyphs(text) {
    // Measure layout: wrap to multiple lines if needed
    const maxW = Math.min(W * 0.78, 900);
    const testSize = clamp(Math.floor(W / (text.length * 0.62)), 18, 72);

    // Simple one-line layout first, then multi-line if overflows
    // We'll place glyphs word by word
    const words = text.split(' ');
    const lines  = [];
    let line = '';

    ctx.font = `${testSize}px "EB Garamond", serif`;
    words.forEach(w => {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && line) {
            lines.push(line);
            line = w;
        } else {
            line = test;
        }
    });
    if (line) lines.push(line);

    const lineH  = testSize * 1.55;
    const totalH = lines.length * lineH;
    const startY = H / 2 - totalH / 2 + testSize * 0.5;

    const newGlyphs = [];
    let charIdx = 0, total = text.length;

    lines.forEach((ln, li) => {
        ctx.font = `${testSize}px "EB Garamond", serif`;
        const lw = ctx.measureText(ln).width;
        const startX = W / 2 - lw / 2;
        let cx = startX;

        for (let i = 0; i < ln.length; i++) {
            const ch = ln[i];
            ctx.font = `${testSize}px "EB Garamond", serif`;
            const cw = ctx.measureText(ch).width;
            const tx = cx + cw / 2;
            const ty = startY + li * lineH;

            if (charIdx < glyphs.length) {
                // recycle existing glyph
                const g = glyphs[charIdx];
                g.ch = ch;
                g.size = testSize * (0.82 + g.weight * 0.36);
                g.setTarget(tx, ty);
            } else {
                newGlyphs.push(new Glyph(ch, tx, ty, charIdx, total));
            }
            cx += cw;
            charIdx++;
        }
        if (li < lines.length - 1) {
            // space between lines — add space char conceptually (no glyph)
        }
    });

    // trim excess
    glyphs = glyphs.slice(0, charIdx).concat(newGlyphs);
    document.getElementById('s-glyphs').textContent  = glyphs.length;
    document.getElementById('s-phrase').textContent  = '"' + text.slice(0, 22) + (text.length > 22 ? '…' : '') + '"';
}

function nextPhrase() {
    phraseIdx = (phraseIdx + 1) % PHRASES.length;
    buildGlyphs(PHRASES[phraseIdx]);
    document.getElementById('text-input').value = '';
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Render ---
function animate() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f0ede8';
    ctx.fillRect(0, 0, W, H);

    // subtle vignette
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.78);
    vg.addColorStop(0, 'rgba(240,237,232,0)');
    vg.addColorStop(1, 'rgba(220,215,205,0.35)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    let entropy = 0;
    glyphs.forEach(g => {
        g.update(state, t);
        g.draw();
        const dx = g.x - g.targetX, dy = g.y - g.targetY;
        entropy += Math.sqrt(dx*dx + dy*dy);
    });

    if (glyphs.length)
        document.getElementById('s-entropy').textContent =
            (entropy / glyphs.length / 10).toFixed(2);

    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my  + 'px';

    t++;
    requestAnimationFrame(animate);
}

// --- Input ---
document.getElementById('text-input').addEventListener('input', e => {
    const val = e.target.value.trim();
    if (val.length > 1) buildGlyphs(val);
});
document.getElementById('text-input').addEventListener('focus', () => {
    cursorEl.style.display = 'none';
});
document.getElementById('text-input').addEventListener('blur', () => {
    cursorEl.style.display = '';
});

window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    const over = glyphs.some(g => {
        const dx = g.x - mx, dy = g.y - my;
        return Math.sqrt(dx*dx+dy*dy) < g.size * 0.7;
    });
    cursorEl.classList.toggle('active', over);
});

window.addEventListener('click', e => {
    // Click a glyph → temporarily boost it away then snap back
    glyphs.forEach(g => {
        const dx = g.x - e.clientX, dy = g.y - e.clientY;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < g.size) {
            g.vx += (dx/(dist+1)) * 12;
            g.vy += (dy/(dist+1)) * 12;
        }
    });
});

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildGlyphs(
        document.getElementById('text-input').value.trim() || PHRASES[phraseIdx]
    );
}

window.addEventListener('resize', resize);
resize();
setState('compose');

// Auto-drift after 3s of no interaction
let idleTimer;
function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
        if (state === 'compose') setState('drift');
    }, 3000);
}
window.addEventListener('mousemove', resetIdle);
window.addEventListener('click', resetIdle);
resetIdle();

animate();
</script>
</body>
</html>
