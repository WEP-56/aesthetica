<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>椅子 — 事物的重量</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f2ed;
      color: #1a1a1a;
      font-family: "Georgia", "宋体", serif;
      min-height: 100vh;
      padding: 14vh 12vw 10vh 12vw;
    }

    .page-num {
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.15em;
      margin-bottom: 8vh;
    }

    .object-name {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 6vh;
      line-height: 1;
    }

    .drawing {
      margin: 4vh 0 6vh 0;
      line-height: 1.3;
      font-family: monospace;
      font-size: clamp(0.55rem, 1.1vw, 0.75rem);
      color: #555;
      white-space: pre;
      user-select: none;
    }

    .body-text {
      max-width: 38rem;
      font-size: clamp(0.88rem, 1.4vw, 1rem);
      line-height: 2;
      color: #2a2a2a;
      margin-bottom: 3rem;
    }

    .body-text p + p {
      margin-top: 1.5rem;
    }

    .note {
      font-size: 0.75rem;
      color: #aaa;
      font-style: italic;
      margin-top: 4rem;
      letter-spacing: 0.05em;
    }

    .nav-bottom {
      position: fixed;
      bottom: 2.5rem;
      right: 4vw;
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #bbb;
    }

    .nav-bottom a {
      text-decoration: none;
      color: #bbb;
      transition: color 0.2s;
    }

    .nav-bottom a:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>

  <p class="page-num">一 / 五</p>

  <h1 class="object-name">椅子</h1>

  <div class="drawing">
    ___________
   |           |
   |           |
   |___________|
    |         |
    |         |
   _|_________|_
  |             |
  |_____________|
    ||       ||
    ||       ||
  </div>

  <div class="body-text">
    <p>
      这把椅子在房间里。
    </p>
    <p>
      你用它，你离开它，你把外套搭在它背上，
      你半夜起来喝水的时候差点撞上它。
    </p>
    <p>
      你从来没有想过它。
    </p>
    <p>
      但它在那里的时间，
      比你在那里的时间长。
    </p>
    <p>
      白天你去上班，
      椅子在。
    </p>
    <p>
      你去旅行十天，
      椅子在。
    </p>
    <p>
      你睡着了，
      椅子在。
    </p>
    <p>
      它不等你。
      它不需要等。
      它只是在。
    </p>
  </div>

  <p class="note">这把椅子没有名字。大多数椅子都没有。</p>

  <nav class="nav-bottom">
    <a href="index.html">目录</a>
    <a href="page2.html">下一件 →</a>
  </nav>

</body>
</html>
