<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关灯后的一秒 — 事物的重量</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #141414;
      color: #d4d0c8;
      font-family: "Georgia", "宋体", serif;
      min-height: 100vh;
      padding: 14vh 12vw 10vh 12vw;
      transition: background-color 0.6s;
    }

    .page-num {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.15em;
      margin-bottom: 8vh;
    }

    .object-name {
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 6vh;
      line-height: 1.3;
      color: #d4d0c8;
    }

    .body-text {
      max-width: 36rem;
      font-size: clamp(0.88rem, 1.4vw, 1rem);
      line-height: 2.1;
      color: #a09c94;
      margin-bottom: 3rem;
    }

    .body-text p + p {
      margin-top: 1.5rem;
    }

    .body-text .bright {
      color: #d4d0c8;
    }

    .one-second {
      margin: 5vh 0;
      font-size: clamp(0.75rem, 1.2vw, 0.88rem);
      color: #555;
      letter-spacing: 0.2em;
      font-style: italic;
    }

    .note {
      font-size: 0.75rem;
      color: #444;
      font-style: italic;
      margin-top: 4rem;
      letter-spacing: 0.05em;
    }

    .nav-bottom {
      position: fixed;
      bottom: 2.5rem;
      right: 4vw;
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .nav-bottom a {
      text-decoration: none;
      color: #444;
      transition: color 0.2s;
    }

    .nav-bottom a:hover {
      color: #d4d0c8;
    }
  </style>
</head>
<body>

  <p class="page-num">二 / 五</p>

  <h1 class="object-name">关灯后的一秒</h1>

  <div class="body-text">
    <p>
      你按下开关。
    </p>
    <p>
      在黑暗完全到来之前，
      有一秒钟，
      <span class="bright">你还能看见房间。</span>
    </p>
    <p>
      不是因为灯还亮着——
      灯已经灭了。
    </p>
    <p>
      是因为你的眼睛
      还记得光。
    </p>
  </div>

  <p class="one-second">— — —</p>

  <div class="body-text">
    <p>
      在那一秒里，
      房间是真实的。
    </p>
    <p>
      桌子在那里。
      杯子在那里。
      你昨天脱下来还没叠的衣服在那里。
    </p>
    <p>
      然后它们消失了。
    </p>
    <p>
      但它们还在那里。
      只是你再也看不见了。
    </p>
    <p class="bright">
      那一秒钟里存在过的东西，
      并没有因为消失而不存在。
    </p>
  </div>

  <p class="note">每个人每天晚上都会经历这一秒。没有人记得它。</p>

  <nav class="nav-bottom">
    <a href="page1.html">← 上一件</a>
    <a href="index.html">目录</a>
    <a href="page3.html">下一件 →</a>
  </nav>


  <script src="../assets/gallery-nav.js"></script>
</body>
</html>
