<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用完的圆珠笔 — 事物的重量</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f2ed;
      color: #1a1a1a;
      font-family: "Georgia", "宋体", serif;
      min-height: 100vh;
      padding: 14vh 12vw 10vh 12vw;
    }

    .page-num {
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.15em;
      margin-bottom: 8vh;
    }

    .object-name {
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 6vh;
      line-height: 1.3;
    }

    .pen-visual {
      margin: 3vh 0 5vh 0;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .pen-body {
      width: clamp(140px, 28vw, 280px);
      height: 8px;
      background: linear-gradient(
        to right,
        #c8c4be,
        #b0aca6
      );
      border-radius: 2px 0 0 2px;
    }

    .pen-tip {
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 14px solid #b0aca6;
    }

    .pen-end {
      width: 12px;
      height: 12px;
      background: #8a8680;
      border-radius: 50% 0 0 50%;
      margin-left: auto;
      margin-right: 0;
      display: none;
    }

    .scratch-area {
      margin: 2vh 0 5vh 2px;
      font-size: 0.7rem;
      color: #ccc;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    .body-text {
      max-width: 38rem;
      font-size: clamp(0.88rem, 1.4vw, 1rem);
      line-height: 2;
      color: #2a2a2a;
      margin-bottom: 3rem;
    }

    .body-text p + p {
      margin-top: 1.5rem;
    }

    .struck {
      text-decoration: line-through;
      color: #bbb;
    }

    .ink-amount {
      display: block;
      margin: 4vh 0;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.08em;
    }

    .ink-bar-wrap {
      width: clamp(140px, 28vw, 280px);
      height: 3px;
      background: #e0ddd8;
      margin-top: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .ink-bar {
      height: 100%;
      width: 0%;
      background: #555;
    }

    .ink-label {
      font-size: 0.65rem;
      color: #ccc;
    }

    .note {
      font-size: 0.75rem;
      color: #aaa;
      font-style: italic;
      margin-top: 4rem;
      letter-spacing: 0.05em;
    }

    .nav-bottom {
      position: fixed;
      bottom: 2.5rem;
      right: 4vw;
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #bbb;
    }

    .nav-bottom a {
      text-decoration: none;
      color: #bbb;
      transition: color 0.2s;
    }

    .nav-bottom a:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>

  <p class="page-num">三 / 五</p>

  <h1 class="object-name">用完的圆珠笔</h1>

  <div class="pen-visual">
    <div class="pen-body"></div>
    <div class="pen-tip"></div>
  </div>

  <p class="scratch-area">（在纸上划了很多下，什么都没有出来）</p>

  <span class="ink-amount">剩余墨水</span>
  <div class="ink-bar-wrap">
    <div class="ink-bar"></div>
  </div>
  <span class="ink-label">0%</span>

  <div class="body-text">
    <p>
      它写过的字加起来有多长，
      你不知道。
    </p>
    <p>
      可能是一份合同。
      可能是一个购物清单。
      可能是某人的电话号码，
      <span class="struck">你后来没有打过</span>。
    </p>
    <p>
      它在某一刻写出了最后一个字，
      然后停了。
    </p>
    <p>
      你没有注意到那是最后一个字。
      你只是觉得这支笔没水了，
      随手扔掉。
    </p>
    <p>
      那个字不知道自己是最后一个字。
    </p>
    <p>
      它只是一个字。
    </p>
  </div>

  <p class="note">你现在用的笔，也会有最后一个字。</p>

  <nav class="nav-bottom">
    <a href="page2.html">← 上一件</a>
    <a href="index.html">目录</a>
    <a href="page4.html">下一件 →</a>
  </nav>

</body>
</html>
