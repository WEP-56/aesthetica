<!DOCTYPE html>

  <title>事物的重量</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #f5f2ed;
      color: #1a1a1a;
      font-family: "Georgia", "宋体", serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 0 12vw;
      min-height: 100vh;
    }

    .title {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: normal;
      letter-spacing: 0.25em;
      color: #1a1a1a;
      margin-bottom: 3.5rem;
    }

      font-size: clamp(0.75rem, 1.2vw, 0.85rem);
      color: #888;
      letter-spacing: 0.1em;
      margin-bottom: 5rem;
      font-style: italic;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-size: clamp(0.85rem, 1.4vw, 1rem);
      letter-spacing: 0.08em;
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      transition: color 0.2s;
      width: fit-content;
    }

    nav a:hover {
      color: #888;
    }

    nav a .index-num {
      font-size: 0.7em;
      color: #bbb;
      font-style: normal;
      min-width: 1.5rem;
    }

    .footer-note {
      position: fixed;
      bottom: 2.5rem;
      left: 12vw;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <p class="title">事物的重量</p>
  <p class="subtitle">五件事，每件都在你离开后继续存在</p>

  <nav>
    <a href="page1.html">
      <span class="index-num">一</span>

    </a>
    <a href="page2.html">

      <span>关灯后的一秒</span>
    </a>
    <a href="page3.html">

    </a>
    <a href="page4.html">
