<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离开 — 事物的重量</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f2ed;
      color: #1a1a1a;
      font-family: "Georgia", "宋体", serif;
      min-height: 100vh;
      padding: 14vh 12vw 20vh 12vw;
    }

    .page-num {
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.15em;
      margin-bottom: 8vh;
    }

    .object-name {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 8vh;
      line-height: 1;
      color: #1a1a1a;
    }

    .body-text {
      max-width: 36rem;
      font-size: clamp(0.88rem, 1.4vw, 1rem);
      line-height: 2.2;
      color: #2a2a2a;
      margin-bottom: 3rem;
    }

    .body-text p + p {
      margin-top: 2rem;
    }

    .list-of-things {
      margin: 5vh 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .list-item {
      font-size: clamp(0.78rem, 1.2vw, 0.88rem);
      color: #888;
      letter-spacing: 0.08em;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .list-item::before {
      content: "—";
      color: #ddd;
      flex-shrink: 0;
    }

    .final-line {
      margin-top: 7vh;
      font-size: clamp(0.88rem, 1.4vw, 1rem);
      color: #1a1a1a;
      line-height: 2;
      max-width: 30rem;
    }

    .very-end {
      margin-top: 8vh;
      font-size: 0.72rem;
      color: #ccc;
      letter-spacing: 0.1em;
    }

    .back-home {
      display: inline-block;
      margin-top: 6vh;
      font-size: 0.75rem;
      color: #bbb;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: #1a1a1a;
    }

    .nav-bottom {
      position: fixed;
      bottom: 2.5rem;
      right: 4vw;
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #bbb;
    }

    .nav-bottom a {
      text-decoration: none;
      color: #bbb;
      transition: color 0.2s;
    }

    .nav-bottom a:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>

  <p class="page-num">五 / 五</p>

  <h1 class="object-name">离开</h1>

  <div class="body-text">
    <p>
      你现在要关掉这个标签页了。
    </p>
    <p>
      关掉之后，
      这些东西还在：
    </p>
  </div>

  <div class="list-of-things">
    <div class="list-item">那把椅子，在某个房间里</div>
    <div class="list-item">关灯后的那一秒，每天晚上都在发生</div>
    <div class="list-item">某支用完的圆珠笔，在某个垃圾桶里</div>
    <div class="list-item">窗玻璃，还没有干透</div>
    <div class="list-item">这个页面，在服务器上</div>
    <div class="list-item">你刚才用眼睛走过的那些字</div>
  </div>

  <div class="final-line">
    <p>
      它们不因为你离开而消失。
    </p>
    <p>
      这是一件令人稍感安慰的事，
      或者令人稍感不安的事，
      取决于你今天的状态。
    </p>
  </div>

  <p class="very-end">— 完 —</p>

  <a class="back-home" href="index.html">← 回到开始</a>

  <nav class="nav-bottom">
    <a href="page4.html">← 上一件</a>
    <a href="index.html">目录</a>
  </nav>

</body>
</html>
